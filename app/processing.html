<!DOCTYPE html>
<html lang="en">
<head>
<style id="credimed-prod-overrides">
/* Credimed production mode: hide Claude Design dev chrome.
   Add ?dev=1 to URL to reveal it (see script below). */
.topbar,
.device-label,
.chrome,
.design-canvas,
.tweak-row,
.tweak-label,
.tweak-seg { display: none !important; }
.device-wrap + .device-wrap { display: none !important; }
.device-wrap {
  margin: 0 auto !important;
  padding: 0 !important;
  width: 100% !important;
  max-width: 480px !important;
}
.iphone, .desktop {
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  min-height: 100vh !important;
  height: auto !important;
}
.stage, .proto-tab, .proto-stage {
  padding: 0 !important;
  background: #FAF6EF !important;
  min-height: 100vh !important;
  display: block !important;
}
.screen {
  width: 100% !important;
  max-width: 100% !important;
  min-height: auto !important;
  height: auto !important;
  border-radius: 0 !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}
html, body { background: #FAF6EF !important; margin: 0 !important; padding: 0 !important; }
/* Safe-area: push hero content below the iPhone Dynamic Island / notch */
.hero { padding-top: calc(24px + env(safe-area-inset-top)) !important; }
/* Hide the fake iPhone Dynamic Island notch that Claude Design draws inside .iphone */
.iphone::before { display: none !important; }
/* Processing-specific: the .proc container holds the animation and gradient background.
   Force it to fill the viewport on mobile so there's no bare dark space below the animation. */
.iphone .proc,
.desktop .proc { min-height: 100vh !important; }
.iphone .screen { background: transparent !important; }
</style>
<script>
/* Reveal dev chrome with ?dev=1 for design reviews */
if (location.search.indexOf("dev=1") >= 0) {
  document.addEventListener("DOMContentLoaded", function () {
    var s = document.getElementById("credimed-prod-overrides");
    if (s) s.disabled = true;
  });
}
</script>
<meta charset="UTF-8">
<title>Credimed — Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50: #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-200: #99F6E4;
  --teal-300: #5EEAD4;
  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0B8278;
  --teal-800: #0A7A70;
  --teal-900: #134E4A;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 55%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-ui);
  color: var(--slate-900);
  background: #FAF6EF;
  -webkit-font-smoothing: antialiased;
}

/* ---- Toolbar ---- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 56px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.14em; color: var(--slate-900);
}
.brand .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--teal-600); }
.tabs { display: flex; gap: 4px; background: var(--slate-100); padding: 4px; border-radius: 999px; }
.tab {
  padding: 7px 12px; border-radius: 999px; border: none;
  background: transparent; font-weight: 600; font-size: 12px;
  color: var(--slate-600); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.tab.active { background: var(--slate-900); color: white; }
.meta { font-size: 12px; color: var(--slate-500); font-weight: 500; }

/* ---- Stage ---- */
.stage {
  min-height: 100vh;
  padding-top: 80px; padding-bottom: 48px;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 48px; flex-wrap: wrap;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(94,234,212,0.08), transparent 55%),
    #FAF6EF;
}
.device-wrap { position: relative; }
.device-label {
  position: absolute; top: -32px; left: 0;
  font-size: 12px; font-weight: 600; color: var(--slate-500);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* Phones */
.iphone {
  width: 390px; height: 810px;
  background: #0f172a;
  border-radius: 52px; padding: 10px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.22), 0 6px 16px rgba(15,23,42,0.1);
  position: relative; flex-shrink: 0;
}
.iphone::before {
  content: ""; position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%); width: 110px; height: 28px;
  background: #020617; border-radius: 999px; z-index: 10;
}
.iphone .screen {
  width: 100%; height: 100%;
  background: #0f172a; border-radius: 42px;
  overflow: hidden; position: relative;
}

/* Desktop */
.desktop {
  width: 720px;
  background: white; border-radius: 16px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.18), 0 6px 16px rgba(15,23,42,0.08);
  overflow: hidden; display: flex; flex-direction: column;
  flex-shrink: 0;
}
.desktop .chrome {
  height: 44px; background: #f8fafc;
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.chrome .dots { display: flex; gap: 6px; }
.chrome .dot { width: 11px; height: 11px; border-radius: 999px; }
.chrome .dot.r { background: #fc615d; } .chrome .dot.y { background: #fcbb40; } .chrome .dot.g { background: #34c749; }
.chrome .url {
  flex: 1; margin-left: 12px; height: 26px;
  background: white; border: 1px solid var(--slate-200);
  border-radius: 8px; padding: 0 12px;
  display: flex; align-items: center; font-size: 12px;
  color: var(--slate-500); gap: 8px;
}
.desktop .body {
  height: 760px;
  background: #0f172a;
  overflow: hidden;
  position: relative;
}

/* ---- Processing surface ----
   Same markup on mobile + desktop. A framed viewport wraps
   the gradient so it can render identically inside both the
   iphone screen and the desktop body. */
.proc {
  position: relative;
  width: 100%; height: 100%;
  background: var(--hero-gradient);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  isolation: isolate;
}
/* Ambient glow */
.proc::before {
  content: ""; position: absolute; inset: -20%;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(94,234,212,0.22), transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(13,148,136,0.35), transparent 55%);
  pointer-events: none;
  animation: ambient 9s ease-in-out infinite;
}
@keyframes ambient {
  0%, 100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(1.5%, -1.5%) scale(1.04); }
}

/* Orbit rings behind the mark — subtle motion, no dominance */
.orbit {
  position: absolute;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.orbit-ring {
  position: absolute; top: 50%; left: 50%;
  border-radius: 999px;
  border: 1px solid rgba(94,234,212,0.18);
  transform: translate(-50%, -50%);
}
.orbit-ring.r1 { width: 180px; height: 180px; animation: pulse-ring 3.4s ease-in-out infinite; }
.orbit-ring.r2 { width: 240px; height: 240px; animation: pulse-ring 3.4s ease-in-out infinite 0.6s; }
.orbit-ring.r3 { width: 320px; height: 320px; animation: pulse-ring 3.4s ease-in-out infinite 1.2s; border-color: rgba(94,234,212,0.10); }

@keyframes pulse-ring {
  0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
  50%      { opacity: 0.35; transform: translate(-50%, -50%) scale(1.06); }
}

/* Mark */
.mark-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  margin-top: -40px; /* pulls everything slightly above center */
}
.mark {
  width: 96px; height: 96px;
  border-radius: 28px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,255,255,0.22);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.3);
  animation: mark-pulse 2.4s ease-in-out infinite;
}
@keyframes mark-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 0 0 0 rgba(94,234,212,0.35), inset 0 1px 0 rgba(255,255,255,0.3); }
  50%      { transform: scale(1.05); box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 0 0 18px rgba(94,234,212,0), inset 0 1px 0 rgba(255,255,255,0.3); }
}

.wordmark {
  margin-top: 22px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.28em;
  color: rgba(255,255,255,0.55);
}

/* Status text — cross-fade */
.status-wrap {
  position: relative;
  margin-top: 44px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.status-line {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  font-size: 17px;
  font-weight: 500;
  color: rgba(255,255,255,0.92);
  letter-spacing: -0.01em;
  opacity: 0;
  transition: opacity 200ms ease;
  white-space: nowrap;
  display: flex; align-items: center; gap: 10px;
}
.status-line.visible { opacity: 1; }

/* Tiny animated dots after the phrase */
.status-dots {
  display: inline-flex;
  gap: 3px;
}
.status-dots span {
  width: 4px; height: 4px;
  border-radius: 999px;
  background: rgba(94,234,212,0.85);
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.status-dots span:nth-child(2) { animation-delay: 0.15s; }
.status-dots span:nth-child(3) { animation-delay: 0.30s; }
@keyframes dot-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40%           { transform: translateY(-3px); opacity: 1; }
}

/* Progress bar */
.progress-wrap {
  margin-top: 36px;
  width: 240px;
  display: flex; flex-direction: column; align-items: center;
}
.progress-track {
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.14);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal-300), var(--teal-400));
  border-radius: 999px;
  width: 0%;
  transition: width 200ms linear;
  position: relative;
}
.progress-fill::after {
  content: "";
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 40px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55));
  border-radius: 999px;
}
.progress-pct {
  margin-top: 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.45);
  font-variant-numeric: tabular-nums;
}

/* Security footer */
.proc-footer {
  position: absolute;
  bottom: 36px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.proc-footer svg { opacity: 0.6; }

/* ---- Final (done) state overrides ---- */
.proc.state-done .mark {
  background:
    linear-gradient(135deg, rgba(94,234,212,0.3) 0%, rgba(13,148,136,0.5) 100%);
  border-color: rgba(94,234,212,0.5);
  animation: mark-pop 400ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
@keyframes mark-pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.proc.state-done .status-line .status-dots { display: none; }

/* Mobile inside iphone — scale down adjustments */
.iphone .proc .mark { width: 88px; height: 88px; border-radius: 26px; }
.iphone .proc .status-line { font-size: 16px; }
.iphone .proc .progress-wrap { width: 200px; }
.iphone .proc .orbit-ring.r1 { width: 160px; height: 160px; }
.iphone .proc .orbit-ring.r2 { width: 220px; height: 220px; }
.iphone .proc .orbit-ring.r3 { width: 300px; height: 300px; }

@media (max-width: 1200px) {
  .desktop { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    CREDIMED · Processing
  </div>
  <div class="tabs">
    <button class="tab active" data-mode="live">Live · 4s loop</button>
    <button class="tab" data-mode="phase1">Phase 1 · 10%</button>
    <button class="tab" data-mode="phase2">Phase 2 · 50%</button>
    <button class="tab" data-mode="phase3">Phase 3 · 90%</button>
    <button class="tab" data-mode="done">Final · ✓</button>
  </div>
  <div class="meta">Between documents → estimate</div>
</div>

<div class="stage">
  <!-- Mobile -->
  <div class="device-wrap">
    <div class="device-label">Mobile · 375px</div>
    <div class="iphone">
      <div class="screen">
        <div class="proc" id="proc-mobile">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Desktop -->
  <div class="device-wrap">
    <div class="device-label">Desktop · full-screen</div>
    <div class="desktop">
      <div class="chrome">
        <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
        <div class="url">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          app.credimed.us/claim/processing
        </div>
      </div>
      <div class="body">
        <div class="proc" id="proc-desktop">
          <!-- filled by JS -->
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const ICONS = {
  mark: `<svg width="44" height="44" viewBox="0 0 32 32">
    <path d="M 11 10 L 11 21 M 21 10 L 21 21"
          fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="16" cy="15.5" r="2.4" fill="white"/>
  </svg>`,
  check: `<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>`,
  lock: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
};

const PHASES = [
  { text: 'Analyzing your receipt',       from: 0.00, to: 1.3 },
  { text: 'Matching your PPO plan',       from: 1.30, to: 2.6 },
  { text: 'Calculating your refund range',from: 2.60, to: 4.0 },
];
const DONE_TEXT = 'Done';
const TOTAL_MS = 4000;

function screenMarkup() {
  return `
    <div class="orbit">
      <div class="orbit-ring r1"></div>
      <div class="orbit-ring r2"></div>
      <div class="orbit-ring r3"></div>
    </div>
    <div class="mark-wrap">
      <div class="mark" data-mark>${ICONS.mark}</div>
      <div class="wordmark">CREDIMED</div>
    </div>
    <div class="status-wrap">
      <div class="status-line" data-phase="0">
        <span>Analyzing your receipt</span>
        <span class="status-dots"><span></span><span></span><span></span></span>
      </div>
      <div class="status-line" data-phase="1">
        <span>Matching your PPO plan</span>
        <span class="status-dots"><span></span><span></span><span></span></span>
      </div>
      <div class="status-line" data-phase="2">
        <span>Calculating your refund range</span>
        <span class="status-dots"><span></span><span></span><span></span></span>
      </div>
      <div class="status-line" data-phase="done">
        <span>Done</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" data-fill></div></div>
      <div class="progress-pct" data-pct>0%</div>
    </div>
    <div class="proc-footer">
      ${ICONS.lock} Encrypted · HIPAA-ready · takes a few seconds
    </div>
  `;
}

const surfaces = [
  document.getElementById('proc-mobile'),
  document.getElementById('proc-desktop'),
];

function mount() {
  surfaces.forEach(s => s.innerHTML = screenMarkup());
}

/* ---- state application ---- */
function setPhase(phaseIdx, progressPct, isDone = false) {
  surfaces.forEach(root => {
    const lines = root.querySelectorAll('.status-line');
    lines.forEach(l => l.classList.remove('visible'));
    if (isDone) {
      root.classList.add('state-done');
      root.querySelector('[data-phase="done"]').classList.add('visible');
      const mark = root.querySelector('[data-mark]');
      if (mark) mark.innerHTML = ICONS.check;
    } else {
      root.classList.remove('state-done');
      const mark = root.querySelector('[data-mark]');
      if (mark) mark.innerHTML = ICONS.mark;
      root.querySelector(`[data-phase="${phaseIdx}"]`).classList.add('visible');
    }
    root.querySelector('[data-fill]').style.width = progressPct + '%';
    root.querySelector('[data-pct]').textContent = Math.round(progressPct) + '%';
  });
}

/* ---- live animation (replays forever on the Live tab) ---- */
let liveRaf = null;
let liveStart = null;

function stopLive() {
  if (liveRaf) cancelAnimationFrame(liveRaf);
  liveRaf = null;
  liveStart = null;
}
function startLive() {
  stopLive();
  liveStart = performance.now();
  const step = (now) => {
    const elapsed = (now - liveStart);
    // Hold "Done" for 800ms, then restart
    if (elapsed >= TOTAL_MS + 800) {
      liveStart = now;
      tick(0);
    } else if (elapsed >= TOTAL_MS) {
      setPhase(null, 100, true);
    } else {
      tick(elapsed);
    }
    liveRaf = requestAnimationFrame(step);
  };
  const tick = (elapsedMs) => {
    const secs = elapsedMs / 1000;
    let phaseIdx = 0;
    for (let i = 0; i < PHASES.length; i++) {
      if (secs >= PHASES[i].from && secs < PHASES[i].to) { phaseIdx = i; break; }
      if (secs >= PHASES[i].to) phaseIdx = i + 1 <= PHASES.length - 1 ? i + 1 : PHASES.length - 1;
    }
    const pct = Math.min(100, (elapsedMs / TOTAL_MS) * 100);
    setPhase(phaseIdx, pct, false);
  };
  liveRaf = requestAnimationFrame(step);
}

/* ---- tab handling ---- */
function applyMode(mode) {
  stopLive();
  if (mode === 'live')  return startLive();
  if (mode === 'phase1') return setPhase(0, 10,  false);
  if (mode === 'phase2') return setPhase(1, 50,  false);
  if (mode === 'phase3') return setPhase(2, 90,  false);
  if (mode === 'done')   return setPhase(null, 100, true);
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    applyMode(t.getAttribute('data-mode'));
  });
});

mount();
applyMode('live');
</script>

<script src="connector.js"></script>
</body>
</html>
