<!DOCTYPE html>
<html lang="en">
<head>
<style id="credimed-prod-overrides">
/* Credimed production mode: hide Claude Design dev chrome.
   Add ?dev=1 to URL to reveal it (see script below). */
.topbar,
.device-label,
.chrome,
.design-canvas,
.tweak-row,
.tweak-label,
.tweak-seg { display: none !important; }
/* Mobile (<768px): show the mobile device-wrap, hide the desktop one */
@media (max-width: 767px) {
  .device-wrap:nth-of-type(2) { display: none !important; }
  .device-wrap:nth-of-type(1) { margin: 0 auto !important; padding: 0 !important; width: 100% !important; max-width: 480px !important; }
}
/* Desktop (>=768px): hide mobile, show the desktop variant (Claude Design built it) */
@media (min-width: 768px) {
  .device-wrap:nth-of-type(1) { display: none !important; }
  .device-wrap:nth-of-type(2) { margin: 40px auto !important; padding: 0 !important; max-width: 960px !important; }
}
.iphone, .desktop {
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  min-height: 100vh !important;
  height: auto !important;
}
.stage, .proto-tab, .proto-stage {
  padding: 0 !important;
  background: #FAF6EF !important;
  min-height: 100vh !important;
  display: block !important;
}
.screen {
  width: 100% !important;
  max-width: 100% !important;
  min-height: auto !important;
  height: auto !important;
  border-radius: 0 !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}
html, body { background: #FAF6EF !important; margin: 0 !important; padding: 0 !important; }
/* Safe-area: push hero content below the iPhone Dynamic Island / notch */
.hero { padding-top: calc(24px + env(safe-area-inset-top)) !important; }
/* Hide the fake iPhone Dynamic Island notch that Claude Design draws inside .iphone */
.iphone::before { display: none !important; }

/* Desktop (>=768px): reveal the Claude Design desktop variant; strip its browser chrome */
@media (min-width: 768px) {
  html, body {
    background:
      radial-gradient(ellipse at top left, rgba(13,148,136,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(94,234,212,0.05), transparent 50%),
      #FAF6EF !important;
  }
  .stage, .proto-tab, .proto-stage {
    min-height: 100vh !important;
    padding: 40px 20px !important;
    display: flex !important;
    justify-content: center !important;
    align-items: flex-start !important;
  }
  .desktop {
    width: auto !important;
    max-width: 960px !important;
    min-height: auto !important;
    border-radius: 20px !important;
    box-shadow: 0 24px 64px rgba(15,23,42,0.14), 0 4px 16px rgba(15,23,42,0.06) !important;
    overflow: hidden !important;
  }
  .desktop .chrome { display: none !important; }
  .desktop .body {
    height: auto !important;
    min-height: auto !important;
  }
}
</style>
<script>
/* Reveal dev chrome with ?dev=1 for design reviews */
if (location.search.indexOf("dev=1") >= 0) {
  document.addEventListener("DOMContentLoaded", function () {
    var s = document.getElementById("credimed-prod-overrides");
    if (s) s.disabled = true;
  });
}
</script>
<meta charset="UTF-8">
<title>Credimed — Before you sign</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50: #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-200: #99F6E4;
  --teal-300: #5EEAD4;
  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0B8278;
  --teal-800: #0A7A70;
  --teal-900: #134E4A;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 60%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-ui);
  color: var(--slate-900);
  background: #FAF6EF;
  -webkit-font-smoothing: antialiased;
}

/* ---- Toolbar ---- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 56px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.14em; color: var(--slate-900);
}
.brand .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--teal-600); }
.tabs { display: flex; gap: 4px; background: var(--slate-100); padding: 4px; border-radius: 999px; }
.tab {
  padding: 7px 12px; border-radius: 999px; border: none;
  background: transparent; font-weight: 600; font-size: 12px;
  color: var(--slate-600); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.tab.active { background: var(--slate-900); color: white; }
.meta { font-size: 12px; color: var(--slate-500); font-weight: 500; }

/* ---- Stage ---- */
.stage {
  min-height: 100vh;
  padding-top: 80px; padding-bottom: 48px;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 48px; flex-wrap: wrap;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(94,234,212,0.08), transparent 55%),
    #FAF6EF;
}
.device-wrap { position: relative; }
.device-label {
  position: absolute; top: -32px; left: 0;
  font-size: 12px; font-weight: 600; color: var(--slate-500);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* iPhone */
.iphone {
  width: 390px; height: 810px;
  background: #0f172a;
  border-radius: 52px; padding: 10px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.22), 0 6px 16px rgba(15,23,42,0.1);
  position: relative; flex-shrink: 0;
}
.iphone::before {
  content: ""; position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%); width: 110px; height: 28px;
  background: #020617; border-radius: 999px; z-index: 10;
}
.iphone .screen {
  width: 100%; height: 100%;
  background: #FAF6EF; border-radius: 42px;
  overflow: hidden; overflow-y: auto;
  position: relative;
  scrollbar-width: none;
}
.iphone .screen::-webkit-scrollbar { display: none; }

/* Desktop */
.desktop {
  width: 720px;
  background: white; border-radius: 16px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.18), 0 6px 16px rgba(15,23,42,0.08);
  overflow: hidden; display: flex; flex-direction: column;
  flex-shrink: 0;
}
.desktop .chrome {
  height: 44px; background: #f8fafc;
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.chrome .dots { display: flex; gap: 6px; }
.chrome .dot { width: 11px; height: 11px; border-radius: 999px; }
.chrome .dot.r { background: #fc615d; } .chrome .dot.y { background: #fcbb40; } .chrome .dot.g { background: #34c749; }
.chrome .url {
  flex: 1; margin-left: 12px; height: 26px;
  background: white; border: 1px solid var(--slate-200);
  border-radius: 8px; padding: 0 12px;
  display: flex; align-items: center; font-size: 12px;
  color: var(--slate-500); gap: 8px;
}
.desktop .body {
  height: 760px;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(13,148,136,0.05), transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(94,234,212,0.06), transparent 55%),
    #f8fafc;
  padding: 40px 0;
  display: flex; justify-content: center; align-items: flex-start;
  position: relative;
  overflow: hidden;
}
.desktop-inner {
  width: 100%; max-width: 480px;
  height: 100%;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px -6px rgba(15,23,42,0.08);
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
}

/* ---- Hero ---- */
.hero {
  position: relative;
  background: var(--hero-gradient);
  color: white;
  padding: 22px 24px 32px;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; inset: -40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.25), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.35), transparent 55%);
  pointer-events: none;
}
.hero-top {
  position: relative; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 20px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: white; display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(6px);
}
.logo-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px 8px 10px; border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
}
.logo-badge .circle {
  width: 28px; height: 28px; border-radius: 999px; background: white;
  display: flex; align-items: center; justify-content: center;
}
.logo-badge .text {
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.14em; color: white;
}
.hero-eyebrow {
  position: relative;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--teal-300);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.hero-title {
  position: relative;
  font-size: 26px; font-weight: 700; line-height: 1.15;
  letter-spacing: -0.02em; margin: 0 0 10px;
  max-width: 420px;
}
.hero-sub {
  position: relative;
  font-size: 13.5px; color: rgba(255,255,255,0.75);
  line-height: 1.5;
  margin: 0 0 18px;
  max-width: 420px;
}
.progress {
  position: relative;
  display: flex; gap: 6px;
}
.progress-seg {
  flex: 1; height: 4px; border-radius: 999px;
  background: rgba(255,255,255,0.18);
}
.progress-seg.active {
  background: linear-gradient(90deg, var(--teal-300), var(--teal-400));
}
.progress-label {
  position: relative;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.72);
  margin-top: 10px;
  letter-spacing: 0.02em;
}

/* ---- Body ---- */
.body-wrap {
  padding: 28px 20px 160px;
}

/* ---- Timeline ---- */
.timeline {
  position: relative;
  padding-left: 52px;
  display: flex; flex-direction: column;
  gap: 6px;
}
.timeline::before {
  content: "";
  position: absolute;
  top: 22px; bottom: 22px;
  left: 19px;
  width: 2px;
  background: linear-gradient(180deg,
    var(--teal-300) 0%,
    var(--teal-400) 30%,
    var(--teal-500) 60%,
    var(--teal-600) 100%);
  border-radius: 1px;
}

.step {
  position: relative;
  padding: 6px 0 20px;
}
.step:last-child { padding-bottom: 0; }

.step-dot {
  position: absolute;
  left: -52px; top: 2px;
  width: 40px; height: 40px;
  border-radius: 999px;
  background: white;
  border: 2px solid var(--teal-300);
  display: flex; align-items: center; justify-content: center;
  color: var(--teal-700);
  box-shadow: 0 4px 12px -4px rgba(13,148,136,0.3);
  z-index: 2;
}
.step:nth-child(1) .step-dot { border-color: var(--teal-300); }
.step:nth-child(2) .step-dot { border-color: var(--teal-400); }
.step:nth-child(3) .step-dot { border-color: var(--teal-500); }
.step:nth-child(4) .step-dot {
  border-color: var(--teal-600);
  background: var(--teal-600);
  color: white;
}

.step-num {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.08em;
  color: var(--teal-700);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.step:nth-child(4) .step-num { color: var(--teal-800); }

.step-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--slate-900);
  margin: 0 0 6px;
  line-height: 1.25;
}
.step-body {
  font-size: 13.5px;
  color: var(--slate-600);
  line-height: 1.55;
  margin: 0;
}
.step-body b {
  color: var(--slate-900);
  font-weight: 600;
}

/* Pill for "certified mail" etc */
.step-pill {
  display: inline-flex;
  align-items: center; gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--teal-50);
  color: var(--teal-700);
  margin-top: 8px;
  letter-spacing: 0.02em;
}
.step-pill svg { width: 10px; height: 10px; }

/* ---- Info box ---- */
.info-box {
  margin-top: 28px;
  background: linear-gradient(180deg, var(--teal-50) 0%, #E6FBF7 100%);
  border: 1px solid var(--teal-200);
  border-radius: 16px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.info-box::before {
  content: "";
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--teal-600);
}
.info-box-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.14em;
  color: var(--teal-700);
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.info-box-label svg { width: 13px; height: 13px; }

.info-box-list {
  list-style: none;
  padding: 0; margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.info-box-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13.5px;
  color: var(--slate-800);
  line-height: 1.4;
}
.info-box-item .check-circle {
  flex-shrink: 0;
  width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--teal-600);
  color: white;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.info-box-item b { color: var(--slate-900); font-weight: 700; }
.info-box-item .muted { color: var(--slate-500); font-weight: 500; }

/* ---- Footer CTA ---- */
.footer-cta {
  padding: 16px 20px 22px;
  background: white;
  border-top: 1px solid var(--slate-200);
  box-shadow: 0 -8px 24px -12px rgba(15,23,42,0.08);
  position: sticky; bottom: 0; border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.btn-primary {
  width: 100%; height: 54px;
  border-radius: 14px;
  background: var(--teal-600);
  color: white; border: none;
  font-weight: 700; font-size: 15px;
  cursor: pointer;
  transition: all 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 6px 18px rgba(13,148,136,0.28);
  font-family: inherit;
}
.btn-primary:hover { background: var(--teal-800); transform: translateY(-1px); }
.btn-primary .arrow { transition: transform 150ms ease; }
.btn-primary:hover .arrow { transform: translateX(3px); }

.secondary-link {
  font-size: 13px;
  font-weight: 600;
  color: var(--teal-700);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  padding: 4px 8px;
}
.secondary-link:hover { text-decoration: underline; }

.trust-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 11px; color: var(--slate-500);
  font-weight: 500;
  margin-top: 6px;
}
.trust-row .dot-sep { color: var(--slate-300); }
.trust-row svg { flex-shrink: 0; }

/* ---- Agreement drawer ---- */
.drawer-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,0.45);
  backdrop-filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 220ms ease;
  z-index: 10;
  border-radius: inherit;
}
.iphone .screen .drawer-backdrop { border-radius: 42px; }
.drawer-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}
.drawer {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: white;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  box-shadow: 0 -20px 60px rgba(0,0,0,0.25);
  transform: translateY(100%);
  transition: transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 11;
  display: flex; flex-direction: column;
  max-height: 82%;
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 44px; height: 5px;
  border-radius: 999px;
  background: var(--slate-300);
  margin: 10px auto 4px;
  flex-shrink: 0;
}
.drawer-head {
  padding: 12px 22px 14px;
  border-bottom: 1px solid var(--slate-200);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.drawer-head .title {
  font-size: 15px; font-weight: 700;
  color: var(--slate-900);
  display: flex; flex-direction: column; gap: 2px;
}
.drawer-head .title .sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--slate-500);
  letter-spacing: 0.02em;
}
.drawer-close {
  width: 32px; height: 32px;
  border-radius: 999px;
  background: var(--slate-100);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--slate-600);
}
.drawer-close:hover { background: var(--slate-200); }

.drawer-body {
  padding: 18px 22px 22px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  touch-action: pan-y;
  font-size: 13px;
  line-height: 1.6;
  color: var(--slate-600);
  flex: 1;
  min-height: 0;
}
.drawer-body h4 {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal-700);
  margin: 18px 0 6px;
}
.drawer-body h4:first-child { margin-top: 0; }
.drawer-body p { margin: 0 0 10px; }
.drawer-body b { color: var(--slate-900); font-weight: 600; }

.drawer-footer {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--slate-200);
  background: white;
  flex-shrink: 0;
}
.drawer-footer .btn-primary {
  box-shadow: 0 6px 18px rgba(13,148,136,0.28);
}

@media (max-width: 1200px) {
  .desktop { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    CREDIMED · Before you sign
  </div>
  <div class="tabs">
    <button class="tab active" data-variant="default">Default</button>
    <button class="tab" data-variant="drawer">Agreement preview</button>
  </div>
  <div class="meta">Step 4 of 4 · Setting expectations</div>
</div>

<div class="stage">
  <!-- Mobile -->
  <div class="device-wrap">
    <div class="device-label">Mobile · 375px</div>
    <div class="iphone">
      <div class="screen" id="screen-mobile"></div>
    </div>
  </div>

  <!-- Desktop -->
  <div class="device-wrap">
    <div class="device-label">Desktop · 480px max</div>
    <div class="desktop">
      <div class="chrome">
        <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
        <div class="url">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          app.credimed.us/claim/before-sign
        </div>
      </div>
      <div class="body">
        <div class="desktop-inner" id="screen-desktop"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ICONS = {
  back: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
  mark: '<svg width="18" height="18" viewBox="0 0 32 32"><path d="M 11 10 L 11 21 M 21 10 L 21 21" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/><circle cx="16" cy="15" r="2.5" fill="#0D9488"/></svg>',
  check: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',

function stepHtml(step) {
  const pill = step.pill
    ? `<div class="step-pill">${step.pill.icon} ${step.pill.text}</div>`
    : '';
  return `
    <div class="step">
      <div class="step-dot">${step.icon}</div>
      <div class="step-num">${step.num}</div>
      <h3 class="step-title">${step.title}</h3>
      <p class="step-body">${step.body}</p>
      ${pill}
    </div>
  `;
}

let activeVariant = 'default';

function mount() {
  document.getElementById('screen-mobile').innerHTML = renderScreen();
  document.getElementById('screen-desktop').innerHTML = renderScreen();
  wire();
  applyDrawerState();
}

function applyDrawerState() {
  const open = activeVariant === 'drawer';
  document.querySelectorAll('[data-drawer]').forEach(el => el.classList.toggle('open', open));
  document.querySelectorAll('[data-drawer-backdrop]').forEach(el => el.classList.toggle('open', open));
}

function wire() {
  document.querySelectorAll('[data-read-terms]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeVariant = 'drawer';
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelector('[data-variant="drawer"]').classList.add('active');
      applyDrawerState();
    });
  });
  document.querySelectorAll('[data-drawer-close]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeVariant = 'default';
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      // In production mode the Claude Design dev tabs are hidden, so the
      // [data-variant="default"] button may not exist. Guard against null
      // so the handler reaches applyDrawerState() and the drawer actually
      // closes.
      const defTab = document.querySelector('[data-variant="default"]');
      if (defTab) defTab.classList.add('active');
      applyDrawerState();
    });
  });
  document.querySelectorAll('[data-drawer-backdrop]').forEach(bd => {
    bd.addEventListener('click', () => {
      activeVariant = 'default';
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelector('[data-variant="default"]').classList.add('active');
      applyDrawerState();
    });
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeVariant = t.getAttribute('data-variant');
    applyDrawerState();
  });
});

mount();
</script>
