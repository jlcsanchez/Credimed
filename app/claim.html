<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credimed — Claim detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50:#F0FDFA; --teal-100:#CCFBF1; --teal-300:#5EEAD4; --teal-500:#14B8A6;
  --teal-600:#0D9488; --teal-700:#0B8278; --teal-800:#0A7A70; --teal-900:#134E4A;
  --slate-50:#F8FAFC; --slate-100:#F1F5F9; --slate-200:#E2E8F0; --slate-300:#CBD5E1;
  --slate-400:#94A3B8; --slate-500:#64748B; --slate-600:#475569; --slate-700:#334155;
  --slate-800:#1E293B; --slate-900:#0F172A;
  --amber-bg:#FEF3C7; --amber-fg:#92400E;
  --indigo-bg:#EEF2FF; --indigo-fg:#3730A3;
  --success-bg:#ECFDF5; --success-fg:#047857; --success-border:#A7F3D0;
  --danger-bg:#FEF2F2; --danger-fg:#B91C1C;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 55%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: "SF Mono", ui-monospace, "Menlo", monospace;
}
*{box-sizing:border-box}
html,body{
  margin:0; font-family:var(--font-ui); color:var(--slate-900);
  background:#FAF6EF; -webkit-font-smoothing:antialiased;
  overflow-x:hidden; max-width:100vw;
}
.page { max-width:480px; margin:0 auto; min-height:100vh; background:#FAF6EF; display:flex; flex-direction:column; }
@media (min-width:768px) {
  html, body {
    background:
      radial-gradient(ellipse at top left, rgba(13,148,136,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(94,234,212,0.05), transparent 50%),
      #FAF6EF !important;
  }
  .page { max-width:520px; margin:40px auto; border-radius:24px; min-height:auto; box-shadow:0 24px 64px rgba(15,23,42,0.14), 0 4px 16px rgba(15,23,42,0.06); overflow:hidden; }
}
.hero {
  position:relative; color:#fff;
  padding:calc(22px + env(safe-area-inset-top)) 24px 32px;
  background:var(--hero-gradient); overflow:hidden;
}
.hero::before {
  content:""; position:absolute; inset:-40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.22), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.30), transparent 55%);
  pointer-events:none;
}
.hero-top { position:relative; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px; }
.icon-btn {
  width:36px; height:36px; border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.08); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(6px); text-decoration:none;
}
.logo-badge {
  display:inline-flex; align-items:center; gap:10px;
  padding:8px 14px 8px 10px; border-radius:999px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
}
.logo-badge .circle { width:28px; height:28px; border-radius:999px; background:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; color:#0D9488; font-size:12px; }
.logo-badge .text { font-weight:700; font-size:12px; letter-spacing:0.14em; color:#fff; }

.hero .ref { position:relative; font-size:11.5px; font-weight:700; letter-spacing:0.12em; color:rgba(255,255,255,0.7); font-family:var(--font-mono); }
.hero h1 {
  position:relative; font-size:24px; font-weight:700; letter-spacing:-0.01em;
  margin:6px 0 12px;
}
.hero .pill-row { position:relative; }
.status-pill { display:inline-block; padding:5px 13px; border-radius:99px; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; }
.pill-teal { background:var(--teal-100); color:var(--teal-900); }
.pill-indigo { background:var(--indigo-bg); color:var(--indigo-fg); }
.pill-success { background:var(--success-bg); color:var(--success-fg); border:1px solid var(--success-border); }
.pill-amber { background:var(--amber-bg); color:var(--amber-fg); }
.pill-danger { background:var(--danger-bg); color:var(--danger-fg); }

.body-wrap { padding:0 20px 60px; display:flex; flex-direction:column; gap:14px; margin-top:-14px; position:relative; z-index:2; }

.card {
  background:#fff; border:1px solid rgba(15,23,42,0.06); border-radius:16px;
  padding:18px 20px; box-shadow:0 4px 14px -8px rgba(15,23,42,0.08);
}
.card h2 {
  font-size:11px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--slate-500); margin:0 0 12px; padding-bottom:10px; border-bottom:1px solid var(--slate-100);
}

.kv { display:flex; justify-content:space-between; padding:8px 0; font-size:13.5px; gap:12px; }
.kv .k { color:var(--slate-500); flex-shrink:0; }
.kv .v { color:var(--slate-900); font-weight:600; text-align:right; }

.timeline { margin:6px 0; }
.timeline-step { display:flex; gap:12px; padding:6px 0; }
.timeline-dot { flex-shrink:0; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; }
.timeline-dot.done { background:var(--teal-600); color:#fff; }
.timeline-dot.current { background:var(--teal-100); color:var(--teal-700); border:2px solid var(--teal-600); }
.timeline-dot.future { background:var(--slate-100); color:var(--slate-400); border:2px dashed var(--slate-300); }
.timeline-step:not(:last-child) { position:relative; }
.timeline-step:not(:last-child)::before {
  content:""; position:absolute; left:11px; top:30px; width:2px; height:calc(100% - 28px);
  background:var(--slate-200);
}
.timeline-step.done:not(:last-child)::before { background:var(--teal-600); }
.timeline-content { flex:1; padding-bottom:12px; }
.timeline-label { font-size:14px; font-weight:700; color:var(--slate-900); }
.timeline-date { font-size:12px; color:var(--slate-500); margin-top:2px; }

.actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn {
  flex:1; min-width:0; padding:12px 14px; border-radius:99px;
  font-size:14px; font-weight:700; text-decoration:none; text-align:center;
  border:1px solid var(--slate-300); background:#fff; color:var(--slate-700);
  cursor:pointer; font-family:inherit;
}
.btn:hover { background:var(--slate-50); }
.btn-primary { background:var(--teal-600); color:#fff; border-color:var(--teal-600); }
.btn-primary:hover { background:var(--teal-700); }

.docs-row { display:flex; gap:8px; flex-wrap:wrap; }
.doc-chip {
  padding:8px 14px; background:var(--slate-50); border:1px solid var(--slate-200);
  border-radius:99px; font-size:12px; font-weight:600; color:var(--slate-700);
  display:flex; align-items:center; gap:6px;
}
.doc-chip svg { width:14px; height:14px; color:var(--teal-600); }

.loading { padding:40px 20px; text-align:center; color:var(--slate-500); font-size:13.5px; }
.spin { display:inline-block; width:18px; height:18px; border:2.5px solid var(--slate-200); border-top-color:var(--teal-600); border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:10px; }
@keyframes spin { to { transform:rotate(360deg); } }

.empty {
  background:#fff; border:1px dashed var(--slate-300); border-radius:16px;
  padding:40px 24px; text-align:center; color:var(--slate-500);
}
.empty strong { display:block; color:var(--slate-700); font-size:15px; margin-bottom:6px; }

.refund-hero {
  background:linear-gradient(135deg, var(--teal-50), #fff);
  border:1px solid var(--teal-100); border-radius:16px; padding:18px 20px;
  text-align:center;
}
.refund-hero .lbl { font-size:11px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:var(--teal-700); }
.refund-hero .amt { font-size:30px; font-weight:800; color:var(--slate-900); margin-top:4px; letter-spacing:-0.02em; }
.refund-hero .sub { font-size:12.5px; color:var(--slate-500); margin-top:4px; }

.copy-btn {
  background:transparent; border:1px solid rgba(255,255,255,0.18); color:#fff;
  padding:4px 10px; border-radius:99px; font-size:11px; font-weight:600;
  cursor:pointer; font-family:inherit; margin-left:8px;
}
.copy-btn.copied { background:rgba(255,255,255,0.16); }
</style>
<script src="/app/require-auth.js"></script>
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="hero-top">
      <a href="/app/claims.html" class="icon-btn brand" aria-label="Back to claims">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <span class="logo-badge"><span class="circle">C</span><span class="text">CREDIMED</span></span>
    </div>
    <div class="ref" id="ref">—<button class="copy-btn" id="copyBtn">Copy</button></div>
    <h1 id="title">Loading…</h1>
    <div class="pill-row" id="pillRow"></div>
  </header>

  <div class="body-wrap" id="body">
    <div class="loading"><span class="spin"></span>Loading claim…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
<script src="backend.js"></script>
<script src="state.js"></script>
<script src="connector.js"></script>
<script>
(function () {
  'use strict';

  var STATUS_PILL = {
    'submitted':  { label: 'Submitted',  cls: 'pill-teal' },
    'in-review':  { label: 'In review',  cls: 'pill-indigo' },
    'approved':   { label: 'Approved',   cls: 'pill-success' },
    'paid':       { label: 'Paid',       cls: 'pill-success' },
    'denied':     { label: 'Denied',     cls: 'pill-danger' },
  };
  var ORDER = ['submitted', 'in-review', 'approved', 'paid'];

  function $(id) { return document.getElementById(id); }
  function getParam(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
    return m ? decodeURIComponent(m[1]) : null;
  }
  function money(n) {
    if (n == null) return '—';
    var v = Number(n);
    if (isNaN(v)) return '—';
    return '$' + v.toLocaleString('en-US');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
    catch (e) { return iso; }
  }

  function buildTimeline(c) {
    var status = c.status || 'submitted';
    if (status === 'denied') {
      return [
        { label: 'Submitted',     date: fmtDate(c.submittedAt),  state: 'done' },
        { label: 'Under review',  date: c.reviewStartedAt ? fmtDate(c.reviewStartedAt) : '—', state: 'done' },
        { label: 'Decision: denied', date: c.deniedAt ? fmtDate(c.deniedAt) : '—', state: 'current' }
      ];
    }
    var idx = ORDER.indexOf(status);
    if (idx < 0) idx = 0;
    var steps = [
      { label: 'Submitted',    date: fmtDate(c.submittedAt) },
      { label: 'Under review', date: c.reviewStartedAt ? fmtDate(c.reviewStartedAt) : '—' },
      { label: 'Approved',     date: c.approvedAt ? fmtDate(c.approvedAt) : '—' },
      { label: 'Paid',         date: c.paidAt ? fmtDate(c.paidAt) : '—' }
    ];
    return steps.map(function (s, i) {
      if (i < idx) return Object.assign({}, s, { state: 'done' });
      if (i === idx) return Object.assign({}, s, { state: 'current' });
      return Object.assign({}, s, { state: 'future' });
    });
  }

  function render(c) {
    if (!c) {
      $('body').innerHTML = '<div class="empty"><strong>Claim not found</strong>We could not find this claim. <a href="/app/claims.html">See all your claims</a>.</div>';
      $('title').textContent = 'Not found';
      return;
    }

    var pill = STATUS_PILL[c.status] || { label: '—', cls: 'pill-teal' };
    var procs = Array.isArray(c.procedures) ? c.procedures.join(', ')
              : (c.procedure || 'Dental claim');

    $('ref').innerHTML = (c.id || '—') + '<button class="copy-btn" id="copyBtn">Copy</button>';
    $('title').textContent = procs;
    $('pillRow').innerHTML = '<span class="status-pill ' + pill.cls + '">' + pill.label + '</span>';

    document.getElementById('copyBtn').addEventListener('click', function (e) {
      e.preventDefault();
      navigator.clipboard.writeText(c.id || '').then(function () {
        e.target.textContent = 'Copied';
        e.target.classList.add('copied');
        setTimeout(function () { e.target.textContent = 'Copy'; e.target.classList.remove('copied'); }, 1500);
      });
    });

    var refundLow  = c.estimateMin || c.refundLow;
    var refundHigh = c.estimateMax || c.refundHigh;
    var refundLine = (refundLow && refundHigh)
      ? '$' + Number(refundLow).toLocaleString() + '–$' + Number(refundHigh).toLocaleString()
      : (refundLow ? '$' + Number(refundLow).toLocaleString() : '—');

    var paidUSD = c.paidAmountUSD || c.paidAmount;
    var paidOrigCurrency = (c.paidCurrency || 'USD').toUpperCase();
    var paidOrigSymbol = paidOrigCurrency === 'MXN' ? 'MX$' : '$';
    var paidOrigText = c.paidAmount ? (paidOrigSymbol + Number(c.paidAmount).toLocaleString() + ' ' + paidOrigCurrency) : '—';

    var planMap = { standard: 'Standard ($29)', plus: 'Plus ($79)', premium: 'Premium ($39)' };
    var planLabel = planMap[c.plan] || (c.plan ? c.plan : '—');

    var timeline = buildTimeline(c);

    var docs = '';
    var docList = c.documents || [];
    if (docList.length) {
      docs = '<div class="card"><h2>Documents on file</h2><div class="docs-row">' +
        docList.map(function (d) {
          var name = d.label || d.kind || 'Document';
          return '<div class="doc-chip">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
            name +
          '</div>';
        }).join('') +
      '</div></div>';
    }

    $('body').innerHTML =
      '<div class="refund-hero">' +
        '<div class="lbl">Estimated refund</div>' +
        '<div class="amt">' + refundLine + '</div>' +
        '<div class="sub">USD · paid by your insurer</div>' +
      '</div>' +
      '<div class="card"><h2>Status timeline</h2><div class="timeline">' +
        timeline.map(function (s) {
          var icon = s.state === 'done' ? '✓' : (s.state === 'current' ? '●' : '○');
          return '<div class="timeline-step ' + s.state + '">' +
                   '<div class="timeline-dot ' + s.state + '">' + icon + '</div>' +
                   '<div class="timeline-content">' +
                     '<div class="timeline-label">' + s.label + '</div>' +
                     '<div class="timeline-date">' + s.date + '</div>' +
                   '</div>' +
                 '</div>';
        }).join('') +
      '</div></div>' +
      '<div class="card"><h2>Claim details</h2>' +
        '<div class="kv"><span class="k">Plan</span><span class="v">' + planLabel + '</span></div>' +
        '<div class="kv"><span class="k">Procedure</span><span class="v">' + procs + '</span></div>' +
        '<div class="kv"><span class="k">Insurer</span><span class="v">' + (c.insurer || '—') + '</span></div>' +
        '<div class="kv"><span class="k">Member ID</span><span class="v">' + (c.memberId || '—') + '</span></div>' +
        '<div class="kv"><span class="k">Clinic city</span><span class="v">' + (c.city || '—') + '</span></div>' +
      '</div>' +
      '<div class="card"><h2>Financial breakdown</h2>' +
        '<div class="kv"><span class="k">Paid at clinic</span><span class="v">' + paidOrigText + '</span></div>' +
        (paidUSD && paidOrigCurrency !== 'USD' ? '<div class="kv"><span class="k">≈ in USD</span><span class="v">$' + Number(paidUSD).toLocaleString() + '</span></div>' : '') +
        '<div class="kv"><span class="k">Estimated refund</span><span class="v">' + refundLine + '</span></div>' +
        '<div class="kv"><span class="k">Submitted</span><span class="v">' + fmtDate(c.submittedAt) + '</span></div>' +
      '</div>' +
      docs +
      '<div class="card"><h2>Need help?</h2>' +
        '<div class="actions">' +
          '<a class="btn" href="/app/support.html">Contact support</a>' +
          (c.status === 'denied' ? '<a class="btn btn-primary" href="/app/documents.html">Resubmit claim</a>' : '') +
        '</div>' +
      '</div>';
  }

  async function load() {
    var id = getParam('id');
    if (!id) {
      var S = window.CredimedState;
      var local = S ? S.get('claim', null) : null;
      if (local && local.id) id = local.id;
    }
    if (!id) {
      render(null);
      return;
    }

    // 1) Try the backend.
    var claim = null;
    try {
      if (window.authFetch && window.CREDIMED_API) {
        var resp = await window.authFetch(window.CREDIMED_API + '/claims/' + encodeURIComponent(id));
        if (resp && resp.ok) {
          var data = await resp.json();
          claim = (data && data.claim) || data;
        }
      }
    } catch (e) {
      console.info('[claim] backend fetch skipped:', e.message || e);
    }

    // 2) Fall back to local state.
    if (!claim) {
      var S2 = window.CredimedState;
      var local2 = S2 ? S2.get('claim', null) : null;
      if (local2 && local2.id === id) claim = local2;
    }

    render(claim);
  }

  load();
})();
</script>
<script src="widgets/faq-data.js"></script>
<script src="widgets/agent-chat.js" data-agent="marco"></script>
<script src="auto-logoff.js"></script>
</body>
</html>
