<!DOCTYPE html>
<html lang="en">
<head>
<!-- Preconnect + prefetch Stripe.js so it's fully parsed and in memory
     by the time payment.html loads. Combined with the PaymentIntent
     prefetch below (createPaymentIntent fires on agreement load),
     this lets payment.html mount Stripe without any extra network
     round-trips — only the Stripe Elements iframe has to load. -->
<link rel="preconnect" href="https://js.stripe.com" crossorigin>
<link rel="preconnect" href="https://api.stripe.com" crossorigin>
<link rel="dns-prefetch" href="https://js.stripe.com">
<script async src="https://js.stripe.com/v3/"></script>
<style id="credimed-prod-overrides">
/* Credimed production mode: hide Claude Design dev chrome.
   Add ?dev=1 to URL to reveal it (see script below). */
.topbar,
.device-label,
.chrome,
.design-canvas,
.tweak-row,
.tweak-label,
.tweak-seg { display: none !important; }
/* Mobile (<768px): show the mobile device-wrap, hide the desktop one */
@media (max-width: 767px) {
  .device-wrap:nth-of-type(2) { display: none !important; }
  .device-wrap:nth-of-type(1) { margin: 0 auto !important; padding: 0 !important; width: 100% !important; max-width: 480px !important; }
}
/* Desktop (>=768px): hide mobile, show the desktop variant (Claude Design built it) */
@media (min-width: 768px) {
  .device-wrap:nth-of-type(1) { display: none !important; }
  .device-wrap:nth-of-type(2) { margin: 40px auto !important; padding: 0 !important; max-width: 960px !important; }
}
.iphone, .desktop {
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  min-height: 100vh !important;
  height: auto !important;
}
.stage, .proto-tab, .proto-stage {
  padding: 0 !important;
  background: #f0eee9 !important;
  min-height: 100vh !important;
  display: block !important;
}
.screen {
  width: 100% !important;
  max-width: 100% !important;
  min-height: auto !important;
  height: auto !important;
  border-radius: 0 !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}
html, body { background: #f0eee9 !important; margin: 0 !important; padding: 0 !important; }
/* Safe-area: push hero content below the iPhone Dynamic Island / notch */
.hero { padding-top: calc(24px + env(safe-area-inset-top)) !important; }
/* Hide the fake iPhone Dynamic Island notch that Claude Design draws inside .iphone */
.iphone::before { display: none !important; }

/* Desktop (>=768px): reveal the Claude Design desktop variant; strip its browser chrome */
@media (min-width: 768px) {
  html, body {
    background:
      radial-gradient(ellipse at top left, rgba(13,148,136,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(94,234,212,0.05), transparent 50%),
      #f0eee9 !important;
  }
  .stage, .proto-tab, .proto-stage {
    min-height: 100vh !important;
    padding: 40px 20px !important;
    display: flex !important;
    justify-content: center !important;
    align-items: flex-start !important;
  }
  .desktop {
    width: auto !important;
    max-width: 960px !important;
    min-height: auto !important;
    border-radius: 20px !important;
    box-shadow: 0 24px 64px rgba(15,23,42,0.14), 0 4px 16px rgba(15,23,42,0.06) !important;
    overflow: hidden !important;
  }
  .desktop .chrome { display: none !important; }
  .desktop .body {
    height: auto !important;
    min-height: auto !important;
  }
}
</style>
<script>
/* Reveal dev chrome with ?dev=1 for design reviews */
if (location.search.indexOf("dev=1") >= 0) {
  document.addEventListener("DOMContentLoaded", function () {
    var s = document.getElementById("credimed-prod-overrides");
    if (s) s.disabled = true;
  });
}
</script>
<meta charset="UTF-8">
<title>Credimed — Service Agreement</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50: #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-200: #99F6E4;
  --teal-300: #5EEAD4;
  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0B8278;
  --teal-800: #0A7A70;
  --teal-900: #134E4A;
  --slate-50: #F8FAFC;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 60%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-ui);
  color: var(--slate-900);
  background: #f0eee9;
  -webkit-font-smoothing: antialiased;
}

/* ---- Toolbar ---- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 56px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.14em; color: var(--slate-900);
}
.brand .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--teal-600); }
.tabs { display: flex; gap: 4px; background: var(--slate-100); padding: 4px; border-radius: 999px; }
.tab {
  padding: 7px 12px; border-radius: 999px; border: none;
  background: transparent; font-weight: 600; font-size: 12px;
  color: var(--slate-600); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.tab.active { background: var(--slate-900); color: white; }
.meta { font-size: 12px; color: var(--slate-500); font-weight: 500; }

/* ---- Stage ---- */
.stage {
  min-height: 100vh;
  padding-top: 80px; padding-bottom: 48px;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 48px; flex-wrap: wrap;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(94,234,212,0.08), transparent 55%),
    #f0eee9;
}
.device-wrap { position: relative; }
.device-label {
  position: absolute; top: -32px; left: 0;
  font-size: 12px; font-weight: 600; color: var(--slate-500);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* iPhone */
.iphone {
  width: 390px; height: 810px;
  background: #0f172a;
  border-radius: 52px; padding: 10px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.22), 0 6px 16px rgba(15,23,42,0.1);
  position: relative; flex-shrink: 0;
}
.iphone::before {
  content: ""; position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%); width: 110px; height: 28px;
  background: #020617; border-radius: 999px; z-index: 10;
}
.iphone .screen {
  width: 100%; height: 100%;
  background: white; border-radius: 42px;
  overflow: hidden; overflow-y: auto;
  position: relative;
  scrollbar-width: none;
}
.iphone .screen::-webkit-scrollbar { display: none; }

/* Desktop */
.desktop {
  width: 720px;
  background: white; border-radius: 16px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.18), 0 6px 16px rgba(15,23,42,0.08);
  overflow: hidden; display: flex; flex-direction: column;
  flex-shrink: 0;
}
.desktop .chrome {
  height: 44px; background: #f8fafc;
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.chrome .dots { display: flex; gap: 6px; }
.chrome .dot { width: 11px; height: 11px; border-radius: 999px; }
.chrome .dot.r { background: #fc615d; } .chrome .dot.y { background: #fcbb40; } .chrome .dot.g { background: #34c749; }
.chrome .url {
  flex: 1; margin-left: 12px; height: 26px;
  background: white; border: 1px solid var(--slate-200);
  border-radius: 8px; padding: 0 12px;
  display: flex; align-items: center; font-size: 12px;
  color: var(--slate-500); gap: 8px;
}
.desktop .body {
  height: 760px;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(13,148,136,0.05), transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(94,234,212,0.06), transparent 55%),
    #f8fafc;
  padding: 40px 0;
  display: flex; justify-content: center; align-items: flex-start;
  position: relative;
  overflow: hidden;
}
.desktop-inner {
  width: 100%; max-width: 520px;
  height: 100%;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px -6px rgba(15,23,42,0.08);
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
}

/* ---- Hero ---- */
.hero {
  position: relative;
  background: var(--hero-gradient);
  color: white;
  padding: 22px 24px 28px;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; inset: -40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.25), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.35), transparent 55%);
  pointer-events: none;
}
.hero-top {
  position: relative; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 18px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: white; display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(6px);
}
.logo-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px 8px 10px; border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
}
.logo-badge .circle {
  width: 28px; height: 28px; border-radius: 999px; background: white;
  display: flex; align-items: center; justify-content: center;
}
.logo-badge .text {
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.14em; color: white;
}

.final-pill {
  position: relative;
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 11px;
  border-radius: 999px;
  background: rgba(94,234,212,0.14);
  border: 1px solid rgba(94,234,212,0.3);
  color: var(--teal-300);
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.final-pill::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 999px;
  background: var(--teal-300);
  box-shadow: 0 0 10px rgba(94,234,212,0.8);
}

.hero-title {
  position: relative;
  font-size: 26px; font-weight: 700; line-height: 1.15;
  letter-spacing: -0.02em; margin: 0 0 6px;
}
.hero-sub {
  position: relative;
  font-size: 12.5px;
  color: rgba(255,255,255,0.58);
  font-weight: 500;
  letter-spacing: 0.01em;
  margin: 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hero-sub .sep {
  width: 3px; height: 3px; border-radius: 999px;
  background: rgba(255,255,255,0.35);
}

/* ---- Body ---- */
.body-wrap {
  padding: 24px 20px 28px;
}

.section-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.14em;
  color: var(--slate-500);
  text-transform: uppercase;
  margin: 0 0 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label .num {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--slate-900);
  color: white;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0;
}

/* ---- Terms box ---- */
.terms-shell {
  position: relative;
  border: 1px solid var(--slate-200);
  border-radius: 14px;
  background: var(--slate-50);
  overflow: hidden;
}
.terms-scroll {
  max-height: 240px;
  overflow-y: auto;
  padding: 16px 18px 16px;
  font-size: 12.5px;
  line-height: 1.65;
  color: var(--slate-600);
  scrollbar-width: thin;
  scrollbar-color: var(--slate-300) transparent;
}
.terms-scroll::-webkit-scrollbar { width: 6px; }
.terms-scroll::-webkit-scrollbar-thumb {
  background: var(--slate-300); border-radius: 999px;
}
.terms-scroll h5 {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.1em;
  color: var(--teal-700);
  text-transform: uppercase;
  margin: 14px 0 4px;
}
.terms-scroll h5:first-child { margin-top: 0; }
.terms-scroll p { margin: 0 0 8px; }
.terms-scroll b { color: var(--slate-900); font-weight: 700; }

.terms-fade-top,
.terms-fade-bottom {
  position: absolute;
  left: 0; right: 0;
  height: 22px;
  pointer-events: none;
  z-index: 2;
}
.terms-fade-top {
  top: 0;
  background: linear-gradient(180deg, var(--slate-50) 0%, rgba(248,250,252,0) 100%);
}
.terms-fade-bottom {
  bottom: 34px;
  background: linear-gradient(0deg, var(--slate-50) 0%, rgba(248,250,252,0) 100%);
}

.terms-footer {
  height: 34px;
  border-top: 1px solid var(--slate-200);
  background: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  font-size: 11.5px;
  gap: 10px;
  overflow: hidden;
}
.terms-footer .doc-ref {
  color: var(--slate-500);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-width: 0;
  flex: 1 1 auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.terms-footer .doc-ref svg { flex-shrink: 0; }
.terms-footer .doc-ref .fname {
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.download-link { flex-shrink: 0; white-space: nowrap; }
.download-link {
  color: var(--teal-700);
  font-weight: 600;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  background: none; border: none;
  font-family: inherit;
  font-size: 11.5px;
  padding: 0;
}
.download-link:hover { text-decoration: underline; }

/* ---- Checkbox row ---- */
.checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 14px 14px 14px;
  margin-top: 14px;
  border-radius: 12px;
  background: var(--slate-50);
  border: 1px solid var(--slate-200);
  cursor: pointer;
  transition: all 150ms ease;
  user-select: none;
}
.checkbox-row:hover {
  background: white;
  border-color: var(--slate-300);
}
.checkbox-row.checked {
  background: var(--teal-50);
  border-color: var(--teal-300);
}
.check-box {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--slate-400);
  background: white;
  display: flex;
  align-items: center; justify-content: center;
  transition: all 150ms ease;
  margin-top: 1px;
}
.checkbox-row.checked .check-box {
  background: var(--teal-600);
  border-color: var(--teal-600);
}
.check-box svg {
  width: 14px; height: 14px;
  color: white;
  opacity: 0;
  transform: scale(0.6);
  transition: all 150ms ease;
}
.checkbox-row.checked .check-box svg {
  opacity: 1; transform: scale(1);
}
.checkbox-label {
  font-size: 13.5px;
  color: var(--slate-800);
  line-height: 1.5;
  font-weight: 500;
}
.checkbox-label b { color: var(--slate-900); font-weight: 700; }
.checkbox-label a {
  color: var(--teal-700);
  font-weight: 600;
  text-decoration: underline;
  text-decoration-color: var(--teal-300);
  text-underline-offset: 2px;
}

/* ---- Divider ---- */
.block-spacer { height: 24px; }

/* ---- Signature ---- */
.sig-box {
  position: relative;
  width: 100%;
  aspect-ratio: 320 / 120;
  border: 1.5px dashed var(--slate-300);
  border-radius: 12px;
  background: white;
  overflow: hidden;
  transition: border-color 150ms ease;
  cursor: crosshair;
  touch-action: none;
}
.sig-box:hover {
  border-color: var(--slate-400);
}
.sig-box.active {
  border-style: solid;
  border-color: var(--teal-500);
  box-shadow: 0 0 0 3px rgba(20,184,166,0.1);
}
.sig-box canvas {
  width: 100%; height: 100%;
  display: block;
}
.sig-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  color: var(--slate-400);
  font-size: 13px;
  font-weight: 500;
  font-style: italic;
  gap: 7px;
}
.sig-placeholder.hidden { opacity: 0; }
.sig-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
  font-size: 11.5px;
}
.sig-hint {
  color: var(--slate-500);
  font-weight: 500;
}
.sig-hint b { color: var(--slate-700); font-weight: 600; }
.clear-link {
  color: var(--slate-600);
  font-weight: 600;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 11.5px;
  padding: 4px 2px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.clear-link:hover { color: var(--slate-900); }
.clear-link svg { width: 11px; height: 11px; }

/* ---- Address card ---- */
.address-card {
  margin-top: 20px;
  padding: 18px 18px 18px;
  border-radius: 14px;
  background: linear-gradient(180deg, #FEFCE8 0%, #FFFBEB 100%);
  border: 1px solid #FDE68A;
  position: relative;
}
.address-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: #D97706;
  border-radius: 14px 0 0 14px;
}
.addr-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 14px;
}
.addr-icon {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 10px;
  background: #D97706;
  color: white;
  display: flex;
  align-items: center; justify-content: center;
}
.addr-title {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--slate-900);
  margin: 0 0 3px;
  letter-spacing: -0.005em;
  line-height: 1.3;
}
.addr-helper {
  font-size: 12px;
  color: #78350F;
  line-height: 1.45;
  margin: 0;
  font-weight: 500;
}

.field {
  margin-bottom: 10px;
}
.field:last-child { margin-bottom: 0; }
.field-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--slate-700);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.field-label .optional {
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
  color: var(--slate-400);
  margin-left: 4px;
}
.field-input {
  width: 100%;
  height: 42px;
  padding: 0 12px;
  background: white;
  border: 1px solid var(--slate-200);
  border-radius: 9px;
  font-size: 14px;
  font-family: inherit;
  color: var(--slate-900);
  transition: all 150ms ease;
}
.field-input::placeholder {
  color: var(--slate-400);
  font-weight: 400;
}
.field-input:focus {
  outline: none;
  border-color: var(--teal-500);
  box-shadow: 0 0 0 3px rgba(20,184,166,0.12);
}
.field-input:not(:placeholder-shown) {
  background: white;
  font-weight: 500;
}
.field-input.has-value {
  background: white;
  font-weight: 500;
}

.field-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 8px;
}

.autocomplete-hint {
  position: relative;
}
.autocomplete-hint svg {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--slate-400);
  pointer-events: none;
}
.autocomplete-hint .field-input {
  padding-right: 32px;
}

/* ---- Payment method ---- */
.pay-intro {
  font-size: 12.5px;
  color: var(--slate-500);
  line-height: 1.5;
  margin: -4px 0 12px;
}
.pay-intro b { color: var(--slate-700); font-weight: 600; }

.pay-options {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}
.pay-option {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 14px 14px 14px;
  border-radius: 12px;
  background: white;
  border: 1.5px solid var(--slate-200);
  cursor: pointer;
  transition: all 150ms ease;
  user-select: none;
}
.pay-option:hover {
  border-color: var(--slate-300);
  background: var(--slate-50);
}
.pay-option.selected {
  border-color: var(--teal-500);
  background: var(--teal-50);

// State per scope
const DEFAULT_BANK = { holderName: '', bankName: '', routing: '', account: '', confirm: '', type: 'checking' };
const state = {
  mobile: { variant: 'default', checked: false, sig: false, addr: {}, pay: 'check', bank: { ...DEFAULT_BANK }, accountVisible: false },
  desktop: { variant: 'default', checked: false, sig: false, addr: {}, pay: 'check', bank: { ...DEFAULT_BANK }, accountVisible: false },
};

function paintCanvas(canvas, variant) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#0F172A';
  ctx.lineWidth = 2.2;

  if (variant === 'default') return;

  // Half-scribble for 'progress'; fuller signature for 'ready'
  const w = rect.width, h = rect.height;
  ctx.beginPath();
  if (variant === 'progress') {
    // Partial "Mar..." scribble
    const baseY = h * 0.65;
    ctx.moveTo(w * 0.1, baseY);
    ctx.bezierCurveTo(w*0.12, baseY - 30, w*0.15, baseY - 35, w*0.18, baseY);
    ctx.bezierCurveTo(w*0.20, baseY + 5, w*0.22, baseY - 25, w*0.24, baseY);
    ctx.lineTo(w*0.27, baseY - 18);
    ctx.bezierCurveTo(w*0.30, baseY - 25, w*0.33, baseY - 5, w*0.31, baseY);
    ctx.lineTo(w*0.36, baseY);
    ctx.bezierCurveTo(w*0.39, baseY - 22, w*0.42, baseY - 28, w*0.44, baseY);
    ctx.stroke();
  } else {
    // Full flowing signature "Maria G."
    const baseY = h * 0.62;
    ctx.moveTo(w * 0.08, baseY);
    // M
    ctx.bezierCurveTo(w*0.09, baseY - 35, w*0.12, baseY - 38, w*0.14, baseY);
    ctx.bezierCurveTo(w*0.16, baseY - 20, w*0.18, baseY - 22, w*0.20, baseY);
    ctx.bezierCurveTo(w*0.22, baseY - 35, w*0.24, baseY - 38, w*0.26, baseY);
    // a
    ctx.bezierCurveTo(w*0.28, baseY + 5, w*0.30, baseY - 15, w*0.32, baseY - 5);
    ctx.bezierCurveTo(w*0.34, baseY + 5, w*0.35, baseY + 3, w*0.36, baseY - 2);
    // r
    ctx.lineTo(w*0.40, baseY);
    ctx.bezierCurveTo(w*0.41, baseY - 15, w*0.44, baseY - 18, w*0.45, baseY - 10);
    // i
    ctx.moveTo(w*0.49, baseY - 18);
    ctx.lineTo(w*0.49, baseY);
    ctx.moveTo(w*0.485, baseY - 26); ctx.arc(w*0.49, baseY - 26, 0.8, 0, Math.PI*2);
    // a
    ctx.moveTo(w*0.52, baseY);
    ctx.bezierCurveTo(w*0.53, baseY - 12, w*0.56, baseY - 15, w*0.57, baseY - 5);
    ctx.bezierCurveTo(w*0.58, baseY + 3, w*0.59, baseY - 2, w*0.61, baseY);
    // swoosh
    ctx.bezierCurveTo(w*0.67, baseY - 5, w*0.72, baseY - 10, w*0.80, baseY - 4);
    // G
    ctx.moveTo(w*0.88, baseY - 22);
    ctx.bezierCurveTo(w*0.82, baseY - 28, w*0.78, baseY - 10, w*0.84, baseY + 2);
    ctx.bezierCurveTo(w*0.90, baseY + 4, w*0.92, baseY - 5, w*0.89, baseY - 8);
    ctx.lineTo(w*0.85, baseY - 8);
    ctx.stroke();
    // Dot period
    ctx.beginPath();
    ctx.arc(w*0.93, baseY + 2, 1.5, 0, Math.PI*2);
    ctx.fill();
  }
}

// Canvas drawing
function attachDrawing(canvas, scope) {
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let lastX = 0, lastY = 0;

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: touch.clientX - rect.left,
      y: touch.clientY - rect.top,
    };
  };

  const start = (e) => {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    // Hide placeholder, mark active
    const box = canvas.closest('[data-sigbox]');
    box.classList.add('active');
    const placeholder = box.querySelector('[data-sig-placeholder]');
    if (placeholder) placeholder.classList.add('hidden');
    state[scope].sig = true;
    updateCta(scope);
  };
  const move = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0F172A';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  const end = () => { drawing = false; };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', end);
}

function clearCanvas(scope) {
  const canvas = document.querySelector(`[data-canvas][data-scope="${scope}"]`);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const box = canvas.closest('[data-sigbox]');
  box.classList.remove('active');
  const placeholder = box.querySelector('[data-sig-placeholder]');
  if (placeholder) placeholder.classList.remove('hidden');
  state[scope].sig = false;
  updateCta(scope);
}

function bankComplete(scope) {
  const s = state[scope];
  if (s.pay !== 'deposit') return true;
  const b = s.bank;
  return !!(b.holderName && b.bankName && b.routing && b.routing.length === 9 && b.account && b.confirm && b.account === b.confirm && b.type);
}

function addrComplete(scope) {
  const s = state[scope].addr;
  return !!(s.name && s.street && s.city && s.state && s.zip);
}

function updateCta(scope) {
  const cta = document.querySelector(`[data-cta][data-scope="${scope}"]`);
  const hint = document.querySelector(`[data-hint][data-scope="${scope}"]`);
  const hintText = hint.querySelector('[data-hint-text]');
  const s = state[scope];
  const ok = s.checked && s.sig && addrComplete(scope) && bankComplete(scope);

  cta.disabled = !ok;
  hint.style.display = ok ? 'none' : '';
  if (!ok) {
    const missing = [];
    if (!s.checked) missing.push('agree to the terms');
    if (!s.sig) missing.push('add your signature');
    if (s.pay === 'deposit' && !bankComplete(scope)) missing.push('complete your bank info');
    if (!addrComplete(scope)) missing.push('complete your address');
    hintText.textContent = missing.length === 1
      ? `Please ${missing[0]} to continue`
      : `Complete all fields to continue`;
  }
}

function mountScope(scope) {
  const container = document.getElementById(`screen-${scope}`);
  const variant = state[scope].variant;
  container.innerHTML = renderScreen(variant, scope);

  // Init state from variant
  state[scope].checked = variant !== 'default';
  state[scope].sig = variant !== 'default';
  if (variant === 'default') state[scope].addr = {};
  else if (variant === 'progress') state[scope].addr = { name: 'Maria Gonzalez Ramirez', street: '2847 Guadalupe St' };
  else state[scope].addr = { name: 'Maria Gonzalez Ramirez', street: '2847 Guadalupe St', apt: 'Apt 4B', city: 'Austin', state: 'TX', zip: '78705' };

  state[scope].pay = variant === 'ready' ? 'deposit' : 'check';
  state[scope].bank = variant === 'ready'
    ? { holderName: 'Maria Gonzalez Ramirez', bankName: 'Chase Bank', routing: '021000021', account: '7412893650', confirm: '7412893650', type: 'checking' }
    : { ...DEFAULT_BANK };
  state[scope].accountVisible = false;

  // Canvas
  const canvas = container.querySelector(`[data-canvas][data-scope="${scope}"]`);
  requestAnimationFrame(() => {
    paintCanvas(canvas, variant);
    if (variant === 'default') attachDrawing(canvas, scope);
  });

  // Checkbox
  const cb = container.querySelector(`[data-checkbox][data-scope="${scope}"]`);
  cb.addEventListener('click', () => {
    state[scope].checked = !state[scope].checked;
    cb.classList.toggle('checked', state[scope].checked);
    updateCta(scope);
  });

  // Clear
  const clearBtn = container.querySelector(`[data-clear][data-scope="${scope}"]`);
  clearBtn.addEventListener('click', () => clearCanvas(scope));

  // Address inputs
  container.querySelectorAll(`[data-addr-input][data-scope="${scope}"]`).forEach(input => {
    input.addEventListener('input', (e) => {
      state[scope].addr[input.dataset.key] = e.target.value.trim();
      updateCta(scope);
    });
  });

  // Payment method radios
  container.querySelectorAll(`[data-pay-radio][data-scope="${scope}"]`).forEach(opt => {
    opt.addEventListener('click', (e) => {
      e.preventDefault();
      const method = opt.dataset.payRadio;
      if (state[scope].pay === method) return;
      state[scope].pay = method;
      // Toggle selected visual
      container.querySelectorAll(`[data-pay-radio][data-scope="${scope}"]`).forEach(o => {
        o.classList.toggle('selected', o.dataset.payRadio === method);
      });
      // Toggle bank fields
      const bankEl = container.querySelector(`[data-bank-fields][data-scope="${scope}"]`);
      if (method === 'deposit') {
        bankEl.style.display = '';
      } else {
        bankEl.style.display = 'none';
      }
      updateCta(scope);
    });
  });

  // Bank inputs
  container.querySelectorAll(`[data-bank-input][data-scope="${scope}"]`).forEach(input => {
    input.addEventListener('input', (e) => {
      const key = input.dataset.key;
      let val = e.target.value;
      if (key === 'routing' || key === 'account' || key === 'confirm') {
        val = val.replace(/\D/g, '');
        if (e.target.value !== val) e.target.value = val;
      }
      state[scope].bank[key] = val;

      // Confirm match hint
      if (key === 'account' || key === 'confirm') {
        const hint = container.querySelector(`[data-match-hint][data-scope="${scope}"]`);
        const { account, confirm } = state[scope].bank;
        if (confirm && account && confirm !== account) {
          hint.style.display = '';
        } else {
          hint.style.display = 'none';
        }
      }
      updateCta(scope);
    });
  });

  // Eye toggle for account
  const eyeBtn = container.querySelector(`[data-eye-toggle][data-scope="${scope}"]`);
  if (eyeBtn) {
    eyeBtn.addEventListener('click', () => {
      state[scope].accountVisible = !state[scope].accountVisible;
      const acctInput = container.querySelector(`[data-bank-input][data-scope="${scope}"][data-key="account"]`);
      if (state[scope].accountVisible) {
        acctInput.classList.remove('masked');
        eyeBtn.innerHTML = ICONS.eyeOff;
      } else {
        acctInput.classList.add('masked');
        eyeBtn.innerHTML = ICONS.eye;
      }
    });
  }

  // Account type pills
  container.querySelectorAll(`[data-type-pill][data-scope="${scope}"]`).forEach(pill => {
    pill.addEventListener('click', (e) => {
      e.preventDefault();
      const type = pill.dataset.typePill;
      state[scope].bank.type = type;
      container.querySelectorAll(`[data-type-pill][data-scope="${scope}"]`).forEach(p => {
        p.classList.toggle('selected', p.dataset.typePill === type);
      });
      updateCta(scope);
    });
  });

  updateCta(scope);
}

function setVariant(v) {
  state.mobile.variant = v;
  state.desktop.variant = v;
  mountScope('mobile');
  mountScope('desktop');
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    setVariant(t.getAttribute('data-variant'));
  });
});

mountScope('mobile');
mountScope('desktop');
</script>

<!-- Production wiring: signature capture + banking persistence + real CTA gate.
     Saves signature data URL, agreement timestamp, and banking info to CredimedState. -->
<script src="state.js"></script>
<script>
(function () {
  'use strict';
  if (location.search.indexOf('dev=1') >= 0) return;
  if (!window.CredimedState) return;

  var SCOPE = 'mobile';
  var S = window.CredimedState;

  function scoped(sel) { return document.querySelector(sel + '[data-scope="' + SCOPE + '"]'); }

  function hasSignature() {
    var box = scoped('[data-sigbox]');
    return !!(box && box.classList.contains('active'));
  }
  function hasChecked() {
    var cb = scoped('[data-checkbox]');
    return !!(cb && cb.classList.contains('checked'));
  }
  function currentPayMethod() {
    var sel = document.querySelector('[data-pay-radio][data-scope="' + SCOPE + '"].selected');
    return sel ? sel.getAttribute('data-pay-radio') : 'check';
  }
  function bankFieldsValid() {
    if (currentPayMethod() !== 'deposit') return true;
    var keys = ['holderName', 'bankName', 'routing', 'account', 'confirm'];
    var bank = {};
    for (var i = 0; i < keys.length; i++) {
      var el = document.querySelector('[data-bank-input][data-scope="' + SCOPE + '"][data-key="' + keys[i] + '"]');
      bank[keys[i]] = (el && el.value || '').trim();
      if (!bank[keys[i]]) return false;
    }
    if (bank.routing.replace(/\D/g, '').length !== 9) return false;
    if (bank.account !== bank.confirm) return false;
    return true;
  }

  function syncBankingToState() {
    var method = currentPayMethod();
    var bank = { paymentMethod: method };
    if (method === 'deposit') {
      ['holderName', 'bankName', 'routing', 'account'].forEach(function (key) {
        var el = document.querySelector('[data-bank-input][data-scope="' + SCOPE + '"][data-key="' + key + '"]');
        if (el) bank[key] = (el.value || '').trim();
      });
      var typePill = document.querySelector('[data-type-pill][data-scope="' + SCOPE + '"].selected');
      bank.accountType = typePill ? typePill.getAttribute('data-type-pill') : 'checking';
    }
    S.set('banking', bank);
  }

  function updateCtaState() {
    var cta = document.querySelector('[data-cta][data-scope="' + SCOPE + '"]');
    if (!cta) return;
    var ok = hasSignature() && hasChecked() && bankFieldsValid();
    if (ok) cta.removeAttribute('disabled');
    else cta.setAttribute('disabled', 'disabled');
  }

  /* Poll to handle dynamic re-renders inside scope (variant changes, canvas draw, etc.) */
  setInterval(function () {
    updateCtaState();
    syncBankingToState();
  }, 400);

  /* Pre-fill bank holderName with user's name when deposit gets selected */
  document.addEventListener('click', function (e) {
    var opt = e.target.closest('[data-pay-radio="deposit"][data-scope="' + SCOPE + '"]');
    if (!opt) return;
    setTimeout(function () {
      var holder = document.querySelector('[data-bank-input][data-scope="' + SCOPE + '"][data-key="holderName"]');
      if (holder && !holder.value) {
        var first = S.get('user.firstName', '') || '';
        var last  = S.get('user.lastName', '')  || '';
        if (first || last) holder.value = (first + ' ' + last).trim();
      }
    }, 80);
  }, true);

  /* Intercept CTA in capture phase: save everything, then let connector.js navigate */
  document.addEventListener('click', function (e) {
    var cta = e.target.closest('[data-cta][data-scope="' + SCOPE + '"]');
    if (!cta) return;
    if (cta.hasAttribute('disabled')) { e.preventDefault(); e.stopPropagation(); return; }

    var canvas = document.querySelector('[data-canvas][data-scope="' + SCOPE + '"]');
    var sigDataUrl = null;
    if (canvas) {
      try { sigDataUrl = canvas.toDataURL('image/png'); } catch (err) {}
    }

    syncBankingToState();

    S.set('agreement', {
      version: 'v1.1',
      signedAt: new Date().toISOString(),
      signatureDataUrl: sigDataUrl,
      signerFirstName: S.get('user.firstName', ''),
      signerLastName:  S.get('user.lastName', ''),
      signerEmail:     S.get('user.email', ''),
      termsAccepted: true,
      privacyAccepted: true
    });
    /* do NOT preventDefault — connector.js will navigate on .footer-cta .btn-primary click */
  }, true);

  setTimeout(updateCtaState, 300);
})();
</script>

<script>
/* ---- Stripe PaymentIntent prefetch ----
   Fires while the user is reading terms + signing. Result goes into
   CredimedState.pendingPaymentIntent. When payment.html loads, it
   reads the cached clientSecret and mounts Stripe immediately — no
   Lambda round-trip on the payment screen.
   Silent failure: if any step fails, payment.html falls back to its
   own createPaymentIntent call. No user-visible error.
   Decodes the Cognito ID token from localStorage without needing the
   Cognito SDK on this page (saves ~200kb of JS on agreement.html). */
(function () {
  try {
    if (!window.CredimedState) return;
    var pricing = window.CredimedState.get('pricing', null);
    if (!pricing || !pricing.plan) return;

    /* Decode the Cognito ID token stored by the SDK on prior screens.
       Key shape: CognitoIdentityServiceProvider.<clientId>.<sub>.idToken */
    var email = null;
    try {
      var keys = Object.keys(localStorage);
      var idKey = keys.find(function (k) {
        return /CognitoIdentityServiceProvider\..+\..+\.idToken$/.test(k);
      });
      if (idKey) {
        var payload = JSON.parse(atob(localStorage.getItem(idKey).split('.')[1]));
        email = payload.email;
      }
    } catch (e) { /* can't read token */ }
    if (!email) return;

    var claimId = window.CredimedState.get('claim.id');
    if (!claimId && window.CredimedState.generateClaimId) {
      claimId = window.CredimedState.generateClaimId();
    }
    if (!claimId) return;

    var LAMBDA = 'https://vhimqtp4oxicnyv6yarj2kpipe0sjfto.lambda-url.us-west-2.on.aws/';
    var amountForPlan =
      pricing.plan === 'premium' ? 9900 :
      pricing.plan === 'plus'    ? 7900 :
                                   4900;

    console.log('[prefetch] triggering PaymentIntent for', pricing.plan, amountForPlan);
    fetch(LAMBDA, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'create_payment_intent',
        plan: pricing.plan,
        amount: amountForPlan,
        currency: 'usd',
        email: email,
        claimId: claimId
      })
    }).then(function (r) { return r.json(); })
      .then(function (data) {
        var cs = data.clientSecret || data.client_secret || data.paymentIntentClientSecret;
        if (!cs) return;
        window.CredimedState.set('pendingPaymentIntent', {
          clientSecret: cs,
          plan: pricing.plan,
          amount: data.amount || amountForPlan,
          claimId: claimId,
          createdAt: Date.now()
        });
        console.log('[prefetch] PaymentIntent cached, clientSecret len=' + cs.length);
      })
      .catch(function (e) { console.warn('[prefetch] failed (non-fatal):', e); });
  } catch (e) { /* non-fatal */ }
})();
</script>
</body>
</html>
