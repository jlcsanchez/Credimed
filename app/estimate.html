<!DOCTYPE html>
<html lang="en">
<head>
<style id="credimed-prod-overrides">
/* Credimed production mode: hide Claude Design dev chrome.
   Add ?dev=1 to URL to reveal it (see script below). */
.topbar,
.device-label,
.chrome,
.design-canvas,
.tweak-row,
.tweak-label,
.tweak-seg { display: none !important; }
/* Mobile (<768px): show the mobile device-wrap, hide the desktop one */
@media (max-width: 767px) {
  .device-wrap:nth-of-type(2) { display: none !important; }
  .device-wrap:nth-of-type(1) { margin: 0 auto !important; padding: 0 !important; width: 100% !important; max-width: 480px !important; }
}
/* Desktop (>=768px): hide mobile, show the desktop variant (Claude Design built it) */
@media (min-width: 768px) {
  .device-wrap:nth-of-type(1) { display: none !important; }
  .device-wrap:nth-of-type(2) { margin: 40px auto !important; padding: 0 !important; max-width: 960px !important; }
}
.iphone, .desktop {
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  min-height: 100vh !important;
  height: auto !important;
}
.stage, .proto-tab, .proto-stage {
  padding: 0 !important;
  background: #FAF6EF !important;
  min-height: 100vh !important;
  display: block !important;
}
.screen {
  width: 100% !important;
  max-width: 100% !important;
  min-height: auto !important;
  height: auto !important;
  border-radius: 0 !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}
html, body { background: #FAF6EF !important; margin: 0 !important; padding: 0 !important; }
/* Safe-area: push hero content below the iPhone Dynamic Island / notch */
.hero { padding-top: calc(24px + env(safe-area-inset-top)) !important; }
/* Hide the fake iPhone Dynamic Island notch that Claude Design draws inside .iphone */
.iphone::before { display: none !important; }

/* Desktop (>=768px): reveal the Claude Design desktop variant; strip its browser chrome */
@media (min-width: 768px) {
  html, body {
    background:
      radial-gradient(ellipse at top left, rgba(13,148,136,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(94,234,212,0.05), transparent 50%),
      #FAF6EF !important;
  }
  .stage, .proto-tab, .proto-stage {
    min-height: 100vh !important;
    padding: 40px 20px !important;
    display: flex !important;
    justify-content: center !important;
    align-items: flex-start !important;
  }
  .desktop {
    width: auto !important;
    max-width: 960px !important;
    min-height: auto !important;
    border-radius: 20px !important;
    box-shadow: 0 24px 64px rgba(15,23,42,0.14), 0 4px 16px rgba(15,23,42,0.06) !important;
    overflow: hidden !important;
  }
  .desktop .chrome { display: none !important; }
  .desktop .body {
    height: auto !important;
    min-height: auto !important;
  }
}
</style>
<script>
/* Reveal dev chrome with ?dev=1 for design reviews */
if (location.search.indexOf("dev=1") >= 0) {
  document.addEventListener("DOMContentLoaded", function () {
    var s = document.getElementById("credimed-prod-overrides");
    if (s) s.disabled = true;
  });
}
</script>
<meta charset="UTF-8">
<title>Credimed — Refund Estimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50: #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-200: #99F6E4;
  --teal-300: #5EEAD4;
  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0B8278;
  --teal-800: #0A7A70;
  --teal-900: #134E4A;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 60%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-ui);
  color: var(--slate-900);
  background: #FAF6EF;
  -webkit-font-smoothing: antialiased;
}

/* ---- Toolbar ---- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 56px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.14em; color: var(--slate-900);
}
.brand .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--teal-600); }
.tabs { display: flex; gap: 4px; background: var(--slate-100); padding: 4px; border-radius: 999px; }
.tab {
  padding: 7px 12px; border-radius: 999px; border: none;
  background: transparent; font-weight: 600; font-size: 12px;
  color: var(--slate-600); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.tab.active { background: var(--slate-900); color: white; }
.meta { font-size: 12px; color: var(--slate-500); font-weight: 500; }

/* ---- Stage ---- */
.stage {
  min-height: 100vh;
  padding-top: 80px; padding-bottom: 48px;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 48px; flex-wrap: wrap;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(94,234,212,0.08), transparent 55%),
    #FAF6EF;
}
.device-wrap { position: relative; }
.device-label {
  position: absolute; top: -32px; left: 0;
  font-size: 12px; font-weight: 600; color: var(--slate-500);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* iPhone */
.iphone {
  width: 390px; height: 810px;
  background: #0f172a;
  border-radius: 52px; padding: 10px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.22), 0 6px 16px rgba(15,23,42,0.1);
  position: relative; flex-shrink: 0;
}
.iphone::before {
  content: ""; position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%); width: 110px; height: 28px;
  background: #020617; border-radius: 999px; z-index: 10;
}
.iphone .screen {
  width: 100%; height: 100%;
  background: #FAF6EF; border-radius: 42px;
  overflow: hidden; overflow-y: auto;
  position: relative;
  scrollbar-width: none;
}
.iphone .screen::-webkit-scrollbar { display: none; }

/* Desktop */
.desktop {
  width: 720px;
  background: white; border-radius: 16px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.18), 0 6px 16px rgba(15,23,42,0.08);
  overflow: hidden; display: flex; flex-direction: column;
  flex-shrink: 0;
}
.desktop .chrome {
  height: 44px; background: #f8fafc;
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.chrome .dots { display: flex; gap: 6px; }
.chrome .dot { width: 11px; height: 11px; border-radius: 999px; }
.chrome .dot.r { background: #fc615d; } .chrome .dot.y { background: #fcbb40; } .chrome .dot.g { background: #34c749; }
.chrome .url {
  flex: 1; margin-left: 12px; height: 26px;
  background: white; border: 1px solid var(--slate-200);
  border-radius: 8px; padding: 0 12px;
  display: flex; align-items: center; font-size: 12px;
  color: var(--slate-500); gap: 8px;
}
.desktop .body {
  height: 760px;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(13,148,136,0.05), transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(94,234,212,0.06), transparent 55%),
    #f8fafc;
  overflow-y: auto;
  padding: 40px 0;
  display: flex; justify-content: center; align-items: flex-start;
}
.desktop-inner { width: 100%; max-width: 480px; }

/* ---- Hero (compact version on this screen) ---- */
.hero {
  position: relative;
  background: var(--hero-gradient);
  color: white;
  padding: 22px 24px 30px;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; inset: -40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.25), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.35), transparent 55%);
  pointer-events: none;
}
.hero-top {
  position: relative; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 20px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: white; display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(6px);
}
.logo-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px 8px 10px; border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
}
.logo-badge .circle {
  width: 28px; height: 28px; border-radius: 999px; background: white;
  display: flex; align-items: center; justify-content: center;
}
.logo-badge .text {
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.14em; color: white;
}
.hero-eyebrow {
  position: relative;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--teal-300);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.hero-title {
  position: relative;
  font-size: 26px; font-weight: 700; line-height: 1.15;
  letter-spacing: -0.02em; margin: 0 0 16px;
}
.progress {
  position: relative;
  display: flex; gap: 6px;
}
.progress-seg {
  flex: 1; height: 4px; border-radius: 999px;
  background: rgba(255,255,255,0.18);
}
.progress-seg.active {
  background: linear-gradient(90deg, var(--teal-300), var(--teal-400));
}
.progress-label {
  position: relative;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.72);
  margin-top: 10px;
  letter-spacing: 0.02em;
}

/* ---- Body ---- */
.body-wrap {
  padding: 22px 20px 160px;
}

/* ---- Hero estimate card ---- */
.estimate-card {
  background: white;
  border-radius: 22px;
  padding: 28px 22px 22px;
  border: 1px solid var(--slate-200);
  box-shadow:
    0 20px 60px -20px rgba(13,148,136,0.25),
    0 8px 24px -8px rgba(15,23,42,0.08);
  position: relative;
  overflow: hidden;
}
.estimate-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--teal-400), var(--teal-600), var(--teal-400));
}

.estimate-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--teal-700);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 14px;
}
.estimate-eyebrow .spark {
  width: 14px; height: 14px;
  color: var(--teal-600);
}

.range {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  line-height: 1;
  color: var(--teal-700);
  font-weight: 800;
  letter-spacing: -0.035em;
  font-variant-numeric: tabular-nums;
  font-size: 56px;
}
.range .dash {
  color: var(--teal-400);
  font-weight: 400;
  font-size: 40px;
  margin: 0 2px;
  position: relative;
  top: -4px;
}
.range .currency {
  font-size: 0.5em;
  font-weight: 700;
  color: var(--teal-600);
  position: relative;
  top: -0.6em;
  margin-right: 2px;
}

.range-caption {
  margin-top: 14px;
  font-size: 14px;
  line-height: 1.45;
  color: var(--slate-600);
  font-weight: 500;
}
.range-caption b {
  color: var(--slate-900);
  font-weight: 600;
}

.breakdown {
  margin-top: 22px;
  padding-top: 20px;
  border-top: 1px solid var(--slate-200);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.breakdown-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 13.5px;
}
.breakdown-row .label {
  color: var(--slate-600);
  font-weight: 500;
}
.breakdown-row .value {
  color: var(--slate-900);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.breakdown-row.highlight .value {
  color: var(--teal-700);
}

.disclaimer {
  margin-top: 20px;
  padding: 10px 14px;
  background: var(--slate-100);
  border-radius: 10px;
  font-size: 12px;
  color: var(--slate-500);
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.4;
}
.disclaimer .info-dot {
  width: 16px; height: 16px; flex-shrink: 0;
  border-radius: 999px;
  background: var(--slate-300);
  color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  font-style: italic;
  font-family: Georgia, serif;
}

/* ---- How is this calculated? block ---- */
.how-block {
  margin-top: 16px;
  background: white;
  border: 1px solid var(--slate-200);
  border-radius: 16px;
  overflow: hidden;
}
.how-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--slate-900);
  text-align: left;
  transition: background 150ms ease;
}
.how-trigger:hover { background: var(--slate-100); }
.how-trigger .chev {
  width: 20px; height: 20px;
  color: var(--slate-500);
  transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.how-block.open .chev { transform: rotate(180deg); }

.how-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.how-block.open .how-body {
  grid-template-rows: 1fr;
}
.how-body-inner {
  overflow: hidden;
  padding: 0 18px;
}
.how-block.open .how-body-inner {
  padding: 0 18px 20px;
}

.calc-steps {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  padding-left: 30px;
}
.calc-steps::before {
  content: "";
  position: absolute;
  top: 14px; bottom: 14px;
  left: 11px;
  width: 2px;
  background: linear-gradient(180deg, var(--teal-200) 0%, var(--teal-400) 50%, var(--teal-600) 100%);
  border-radius: 1px;
}
.calc-step {
  position: relative;
  padding: 10px 0 10px 14px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
}
.calc-step::before {
  content: "";
  position: absolute;
  left: -24px; top: 14px;
  width: 10px; height: 10px;
  border-radius: 999px;
  background: white;
  border: 2px solid var(--teal-400);
}
.calc-step.final::before {
  background: var(--teal-600);
  border-color: var(--teal-600);
  box-shadow: 0 0 0 4px rgba(13,148,136,0.15);
}
.calc-step .calc-label {
  color: var(--slate-600);
  font-weight: 500;
}
.calc-step .calc-value {
  color: var(--slate-900);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
  flex-shrink: 0;
}
.calc-step.final .calc-label {
  color: var(--slate-900);
  font-weight: 600;
}
.calc-step.final .calc-value {
  color: var(--teal-700);
  font-size: 14px;
}

/* ---- Footer CTA ---- */
.footer-cta {
  padding: 18px 20px 22px;
  background: white;
  border-top: 1px solid var(--slate-200);
  box-shadow: 0 -8px 24px -12px rgba(15,23,42,0.08);
  position: static; border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.btn-primary {
  width: 100%; height: 54px;
  border-radius: 14px;
  background: var(--teal-600);
  color: white; border: none;
  font-weight: 700; font-size: 15px;
  cursor: pointer;
  transition: all 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 6px 18px rgba(13,148,136,0.28);
  font-family: inherit;
}
.btn-primary:hover {
  background: var(--teal-800);
  box-shadow: 0 10px 24px rgba(13,148,136,0.36);
  transform: translateY(-1px);
}
.btn-primary .arrow { transition: transform 150ms ease; }
.btn-primary:hover .arrow { transform: translateX(3px); }

.trust-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 11px; color: var(--slate-500);
  font-weight: 500;
}
.trust-row .dot-sep { color: var(--slate-300); }
.trust-row svg { flex-shrink: 0; }

@media (max-width: 1200px) {
  .desktop { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    CREDIMED · Estimate
  </div>
  <div class="tabs">
    <button class="tab active" data-variant="default">Default</button>

    <button class="tab" data-variant="high">High estimate</button>
  </div>

</div>

<div class="stage">

    <div class="device-label">Mobile · 375px</div>
    <div class="iphone">
      <div class="screen" id="screen-mobile"></div>

</div>

<script>
const ICONS = {
  back: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',

  expanded: {

    receipt: 920,

    breakdown: [
      { label: 'Your out-of-network benefit', value: '60%', highlight: true },
      { label: 'Annual max remaining',         value: '$1,200' },
      { label: 'Already used this year',       value: '$0' },
    ],
    calc: [
      { label: 'Receipt total',          value: '$920' },
      { label: 'Covered procedures',     value: '$850' },
      { label: 'Out-of-network rate',    value: '× 60%' },
      { label: 'Estimated refund (mid)', value: '$510', final: true },
    ],
    expanded: true,
  },
  high: {
    low: 1100, high: 1650,
    receipt: 2740,
    clinic: 'Tijuana',
    plan: 'Cigna PPO Premium',
    breakdown: [
      { label: 'Your out-of-network benefit', value: '80%', highlight: true },
      { label: 'Annual max remaining',         value: '$3,500' },
      { label: 'Already used this year',       value: '$240' },
    ],
    calc: [
      { label: 'Receipt total',          value: '$2,740' },
      { label: 'Covered procedures',     value: '$1,920' },
      { label: 'Out-of-network rate',    value: '× 80%' },
      { label: 'Estimated refund (mid)', value: '$1,375', final: true },
    ],
    expanded: false,
  },
};

function formatRange(low, high) {
  return `
    <span class="currency">$</span><span>${low.toLocaleString()}</span>
    <span class="dash">–</span>
    <span class="currency">$</span><span>${high.toLocaleString()}</span>
  `;
}

function renderScreen(variantKey) {
  const v = VARIANTS[variantKey];
  const progressSegs = [
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg"></div>',
    '<div class="progress-seg"></div>',
  ].join('');

  return `
    <div class="hero">
      <div class="hero-top">
        <button class="back-btn" aria-label="Back">${ICONS.back}</button>
        <div class="logo-badge">
          <span class="circle">${ICONS.mark}</span>
          <span class="text">CREDIMED</span>
        </div>
        <span style="width:36px"></span>
      </div>
      <div class="hero-eyebrow">Your estimate</div>
      <h1 class="hero-title">Here's what we can recover</h1>
      <div class="progress">${progressSegs}</div>
      <div class="progress-label">Step 2 of 4 · Claim setup</div>
    </div>
    <div class="body-wrap">
      <div class="estimate-card">
        <div class="estimate-eyebrow">
          <span class="spark">${ICONS.spark}</span>
          Estimated reimbursement
        </div>
        <div class="range">${formatRange(v.low, v.high)}</div>
        <div class="range-caption">
          Based on your <b>${v.plan}</b> and a <b>$${v.receipt.toLocaleString()} receipt</b> from ${v.clinic}.
        </div>
        <div class="breakdown">
          ${v.breakdown.map(row => `
            <div class="breakdown-row ${row.highlight ? 'highlight' : ''}">
              <span class="label">${row.label}</span>
              <span class="value">${row.value}</span>
            </div>
          `).join('')}
        </div>
        <div class="disclaimer">
          <span class="info-dot">i</span>
          <span>Estimate only · final amount confirmed by your insurer</span>
        </div>
      </div>

      <div class="how-block ${v.expanded ? 'open' : ''}" data-how>
        <button class="how-trigger" data-how-trigger>
          <span>How is this calculated?</span>
          <span class="chev">${ICONS.chev}</span>
        </button>
        <div class="how-body">
          <div class="how-body-inner">
            <ul class="calc-steps">
              ${v.calc.map(step => `
                <li class="calc-step ${step.final ? 'final' : ''}">
                  <span class="calc-label">${step.label}</span>
                  <span class="calc-value">${step.value}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-cta">
      <button class="btn-primary">
        <span>Continue to plan selection</span>
        <span class="arrow">→</span>
      </button>
      <div class="trust-row">
        ${ICONS.shield} HIPAA-ready
        <span class="dot-sep">·</span>
        ${ICONS.lock} 256-bit encrypted
        <span class="dot-sep">·</span>
        US-incorporated
      </div>
    </div>
  `;
}

let activeVariant = 'default';

function mount() {
  document.getElementById('screen-mobile').innerHTML = renderScreen(activeVariant);
  document.getElementById('screen-desktop').innerHTML = renderScreen(activeVariant);
  wire();
}

function wire() {
  document.querySelectorAll('[data-how-trigger]').forEach(btn => {
    btn.addEventListener('click', () => {
      const block = btn.closest('[data-how]');
      block.classList.toggle('open');
    });
  });
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeVariant = t.getAttribute('data-variant');
    mount();
  });
});

mount();
</script>

<script src="connector.js"></script>
<script src="ana.js"></script>

<!-- Production estimate: compute real refund range from receipt OCR data.
     Refund % = 75% of paid amount (single most common US PPO out-of-network rate).
     Low/high range = 60%-75% for UI credibility. Persists to state for payment + dashboard. -->
<script src="state.js"></script>
<script>
(function () {
  'use strict';
  if (location.search.indexOf('dev=1') >= 0) return;
  if (!window.CredimedState) return;

  var MXN_TO_USD = 0.055; // ≈ 18 MXN = 1 USD
  var r = window.CredimedState.get('receipt', {}) || {};
  var ins = window.CredimedState.get('insurance', {}) || {};

  /* Prefer the USD-converted value populated by documents.html after receipt OCR.
     Fall back to raw amountPaid + currency if that's all we have. */
  var paidUSD = null;
  if (r.amountPaidUSD != null) {
    paidUSD = Math.round(Number(r.amountPaidUSD));
  } else if (r.amountPaid != null) {
    var n = parseFloat(r.amountPaid);
    if (!isNaN(n)) {
      paidUSD = r.currency === 'MXN' ? Math.round(n * MXN_TO_USD) : Math.round(n);
    }
  }
  if (!paidUSD) return; /* keep Claude Design defaults if receipt not uploaded yet */

  var low     = Math.round(paidUSD * 0.60);
  var high    = Math.round(paidUSD * 0.75);
  var mid     = Math.round(paidUSD * 0.70);
  var covered = Math.round(paidUSD * 0.92);

  /* Build the plan label: use the carrier extracted from the insurance card.
     E.g. 'Massachusetts Medical PPO'. Fall back to 'US PPO' if we don't have it. */
  var insurerName = (ins.insurer || '').trim();
  var planLabel = insurerName
    ? (/ppo$/i.test(insurerName) ? insurerName : insurerName + ' PPO')
    : 'US PPO';

  /* Persist for downstream screens */
  window.CredimedState.merge('estimate', {
    rangeMin: low, rangeMax: high, midpoint: mid, refundPercent: 75, paidUSD: paidUSD,
    insurer: insurerName || null, planLabel: planLabel
  });

  var breakdown = [
    { label: 'Insurer',                value: insurerName || '—', highlight: !!insurerName }
  ];
  if (ins.memberId) breakdown.push({ label: 'Member ID', value: ins.memberId });
  breakdown.push(
    { label: 'Out-of-network benefit', value: '75%' },
    { label: 'Receipt amount',         value: '$' + paidUSD.toLocaleString() + (r.currency === 'MXN' ? ' USD (converted from MXN)' : ' USD') },
    { label: 'Procedure',              value: r.procedure || '—' }
  );

  var real = {
    low: low, high: high,
    receipt: paidUSD,
    clinic: r.city || 'your clinic',
    plan: planLabel,
    insurer: insurerName || null,
    breakdown: breakdown,
    calc: [
      { label: 'Receipt total',          value: '$' + paidUSD.toLocaleString() },
      { label: 'Covered procedures',     value: '$' + covered.toLocaleString() },
      { label: 'Out-of-network rate',    value: '× 75%' },
      { label: 'Estimated refund (mid)', value: '$' + mid.toLocaleString(), final: true }
    ],
    expanded: false
  };

  /* VARIANTS is declared as `const` at top-level of a classic script in the Claude Design
     block. `const` at top-level does NOT get attached to window — it lives in the Script
     Global Environment (shared across classic scripts in the same document). So we must
     reference `VARIANTS` directly (not `window.VARIANTS`). Same for `renderScreen`
     which IS a `function` declaration and DOES end up on window. */
  var tries = 0;
  function applyOverride() {
    var V;
    try { V = (typeof VARIANTS !== 'undefined') ? VARIANTS : null; }
    catch (e) { V = null; }

    if (!V) {
      if (tries++ > 150) { console.warn('[estimate] VARIANTS never appeared'); return; }
      return setTimeout(applyOverride, 30);
    }

    V.default  = real;
    V.expanded = Object.assign({}, real, { expanded: true });

    /* Re-render mobile + desktop with the real data AND re-wire the accordion.
       window.mount() does both — innerHTML replacement lost the addEventListener
       on [data-how-trigger] which is why 'How is this calculated?' didn't expand. */
    if (typeof window.mount === 'function') {
      window.mount();
    } else if (typeof window.renderScreen === 'function') {
      ['screen-mobile', 'screen-desktop'].forEach(function (id) {
        var host = document.getElementById(id);
        if (host) host.innerHTML = window.renderScreen('default');
      });
    }

    /* Inject the value-reinforcing sections around the estimate card.
       - WHAT WE FOUND (above estimate): concrete list of detected
         procedures so the estimate feels sourced from real data.
       - WHAT WE'LL DO (below estimate, above CTA): static list of the
         services bundled in the fee, re-framing the $49 decision from
         "is this fair vs my refund?" to "is this fair vs this work?".
       Both are pure DOM injections — no VARIANTS changes, no CSS edits. */
    injectValueBlocks();
  }

  function injectValueBlocks() {
    var procedures = Array.isArray(r.procedures) ? r.procedures : [];
    var insurerDisplay = insurerName || 'your insurer';

    function checkRow(text) {
      return '<div style="display:flex;align-items:flex-start;gap:8px;margin:5px 0;font-size:13.5px;line-height:1.45;color:var(--slate-800,#1e293b)">' +
               '<span style="color:var(--teal-600,#0D9488);font-weight:700;flex-shrink:0">✓</span>' +
               '<span>' + text + '</span>' +
             '</div>';
    }

    function sectionBlock(title, rowsHtml, footerHtml) {
      return '<div style="margin:14px 16px;padding:14px 16px;background:var(--teal-50,#F0FDFA);border:1px solid var(--teal-200,#99F6E4);border-radius:12px">' +
               '<div style="color:var(--teal-800,#0A7A70);text-transform:uppercase;font-size:10.5px;letter-spacing:.6px;font-weight:700;margin-bottom:8px">' +
                 title +
               '</div>' +
               rowsHtml +
               (footerHtml || '') +
             '</div>';
    }

    /* Small eligibility note under the procedures list — softens the
       language without claiming any procedure is definitely covered. */
    var foundFooter = '<div style="margin-top:8px;font-size:11.5px;color:var(--slate-500,#64748b);line-height:1.5">These treatments may be eligible for reimbursement under your PPO plan.</div>';
    var foundHtml = procedures.length
      ? sectionBlock('What we found in your receipt', procedures.map(checkRow).join(''), foundFooter)
      : '';

    /* 'Reimbursement goes directly to you' is the highest-trust bullet —
       it answers 'will Credimed touch my money?' — so it leads the list
       to address that objection before the service-detail bullets. */
    var doHtml = sectionBlock("What we'll do", [
      'Reimbursement goes directly to you — we never touch your money',
      'Translate your receipt to English',
      'Map each treatment to its CDT code',
      'Bundle everything into one claim package',
      'Submit electronically to ' + insurerDisplay,
      'Follow up if denied (1 free resubmission)'
    ].map(checkRow).join(''));

    /* Social-proof reassurance placed immediately above the footer CTA
       so it's the last thing the user reads before deciding to continue. */
    var reassuranceHtml = '<div style="text-align:center;font-size:12.5px;color:var(--slate-500,#64748b);padding:14px 20px 8px;line-height:1.5">Most patients like you recover $150–$250.</div>';

    ['screen-mobile', 'screen-desktop'].forEach(function (id) {
      var host = document.getElementById(id);
      if (!host) return;
      var bodyWrap = host.querySelector('.body-wrap');
      if (!bodyWrap) return;
      if (foundHtml) bodyWrap.insertAdjacentHTML('afterbegin', foundHtml);
      bodyWrap.insertAdjacentHTML('beforeend', doHtml);
      var footerCta = host.querySelector('.footer-cta');
      if (footerCta) footerCta.insertAdjacentHTML('beforebegin', reassuranceHtml);
    });
  }

  applyOverride();
})();
</script>
