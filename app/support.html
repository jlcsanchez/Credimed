<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credimed — Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50:#F0FDFA; --teal-100:#CCFBF1; --teal-300:#5EEAD4; --teal-500:#14B8A6;
  --teal-600:#0D9488; --teal-700:#0B8278; --teal-800:#0A7A70; --teal-900:#134E4A;
  --slate-50:#F8FAFC; --slate-100:#F1F5F9; --slate-200:#E2E8F0; --slate-300:#CBD5E1;
  --slate-400:#94A3B8; --slate-500:#64748B; --slate-600:#475569; --slate-700:#334155;
  --slate-800:#1E293B; --slate-900:#0F172A;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 55%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
*{box-sizing:border-box}
html,body{
  margin:0; font-family:var(--font-ui); color:var(--slate-900);
  background:#FAF6EF; -webkit-font-smoothing:antialiased;
  overflow-x:hidden; max-width:100vw;
}
.page { max-width:480px; margin:0 auto; min-height:100vh; background:#FAF6EF; display:flex; flex-direction:column; }
@media (min-width:768px) {
  html, body {
    background:
      radial-gradient(ellipse at top left, rgba(13,148,136,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(94,234,212,0.05), transparent 50%),
      #FAF6EF !important;
  }
  .page { max-width:520px; margin:40px auto; border-radius:24px; min-height:auto; box-shadow:0 24px 64px rgba(15,23,42,0.14), 0 4px 16px rgba(15,23,42,0.06); overflow:hidden; }
}
.hero {
  position:relative; color:#fff;
  padding:calc(22px + env(safe-area-inset-top)) 24px 28px;
  background:var(--hero-gradient); overflow:hidden;
}
.hero::before {
  content:""; position:absolute; inset:-40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.22), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.30), transparent 55%);
  pointer-events:none;
}
.hero-top { position:relative; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
.icon-btn {
  width:36px; height:36px; border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.08); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(6px); text-decoration:none;
}
.logo-badge {
  display:inline-flex; align-items:center; gap:10px;
  padding:8px 14px 8px 10px; border-radius:999px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
}
.logo-badge .circle { width:28px; height:28px; border-radius:999px; background:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; color:#0D9488; font-size:12px; }
.logo-badge .text { font-weight:700; font-size:12px; letter-spacing:0.14em; color:#fff; }

.agent-row { position:relative; display:flex; align-items:center; gap:14px; }
.agent-avatar {
  width:54px; height:54px; border-radius:50%;
  background:linear-gradient(135deg, var(--teal-500), var(--teal-300));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:22px; flex-shrink:0;
  box-shadow:0 6px 20px -8px rgba(94,234,212,0.6);
}
.agent-info h1 { font-size:20px; font-weight:700; letter-spacing:-0.01em; margin:0; }
.agent-info .status { display:flex; align-items:center; gap:6px; font-size:12.5px; color:rgba(255,255,255,0.78); margin-top:2px; }
.agent-info .status::before {
  content:""; width:7px; height:7px; border-radius:50%; background:#5EEAD4;
  box-shadow:0 0 0 2px rgba(94,234,212,0.25);
}

.body-wrap { flex:1; padding:18px 16px 12px; display:flex; flex-direction:column; gap:14px; }

.chips { display:flex; gap:8px; flex-wrap:wrap; }
.chip {
  padding:8px 14px; background:#fff; border:1px solid var(--slate-200);
  border-radius:99px; font-size:12.5px; font-weight:600; color:var(--slate-700);
  cursor:pointer; font-family:inherit;
}
.chip:hover { background:var(--slate-50); border-color:var(--slate-300); }

.thread {
  flex:1; display:flex; flex-direction:column; gap:10px;
  padding:6px 4px; min-height:280px;
}
.bubble {
  max-width:85%; padding:11px 14px; border-radius:16px;
  font-size:14px; line-height:1.45; word-wrap:break-word;
}
.bubble-agent {
  align-self:flex-start; background:#fff; color:var(--slate-900);
  border:1px solid var(--slate-200); border-bottom-left-radius:4px;
}
.bubble-user {
  align-self:flex-end; background:var(--teal-600); color:#fff;
  border-bottom-right-radius:4px;
}
.bubble.typing { display:flex; gap:4px; padding:14px 16px; }
.bubble.typing span {
  width:7px; height:7px; border-radius:50%; background:var(--slate-300);
  animation:typing 1.2s infinite;
}
.bubble.typing span:nth-child(2) { animation-delay:0.2s; }
.bubble.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform:translateY(0); opacity:0.4; }
  30% { transform:translateY(-3px); opacity:1; }
}

.composer {
  position:sticky; bottom:0; padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:rgba(250,246,239,0.96); backdrop-filter:blur(12px);
  border-top:1px solid var(--slate-200); display:flex; gap:8px;
  margin-top:auto;
}
.composer input {
  flex:1; padding:12px 16px; border-radius:99px; border:1px solid var(--slate-300);
  background:#fff; font-size:14px; font-family:inherit; outline:none;
  transition:border-color 0.15s;
}
.composer input:focus { border-color:var(--teal-500); }
.composer button {
  padding:0 18px; border-radius:99px; border:0; background:var(--teal-600);
  color:#fff; font-weight:700; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; min-width:48px;
}
.composer button:hover:not(:disabled) { background:var(--teal-700); }
.composer button:disabled { opacity:0.4; cursor:not-allowed; }

.bottom-nav {
  background:rgba(255,255,255,0.96); backdrop-filter:blur(12px);
  border-top:1px solid var(--slate-200);
  display:flex; padding:10px 0 calc(10px + env(safe-area-inset-bottom));
}
.bottom-nav a {
  flex:1; text-align:center; text-decoration:none; color:var(--slate-500);
  font-size:11px; font-weight:600; padding:6px 4px; display:flex; flex-direction:column; align-items:center; gap:3px;
}
.bottom-nav a.active { color:var(--teal-700); }
.bottom-nav a svg { width:22px; height:22px; }
</style>
<script src="/app/require-auth.js"></script>
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="hero-top">
      <a href="/app/dashboard.html" class="icon-btn brand" aria-label="Back to dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <span class="logo-badge"><span class="circle">C</span><span class="text">CREDIMED</span></span>
    </div>
    <div class="agent-row">
      <div class="agent-avatar">A</div>
      <div class="agent-info">
        <h1>Ana</h1>
        <div class="status">Usually replies in a few minutes</div>
      </div>
    </div>
  </header>

  <div class="body-wrap">
    <div class="chips" id="chips">
      <button class="chip" data-msg="What documents do I need to submit?">What documents do I need?</button>
      <button class="chip" data-msg="How long does my claim take?">How long does it take?</button>
      <button class="chip" data-msg="Is my data secure?">Is my data secure?</button>
      <button class="chip" data-msg="Can I talk to a specialist?">Talk to a specialist</button>
    </div>

    <div class="thread" id="thread">
      <div class="bubble bubble-agent">
        Hola 👋 soy Ana. ¿Te ayudo con algo mientras subes tus documentos o revisas tu estimado?
      </div>
    </div>
  </div>

  <div class="composer">
    <input id="msg" type="text" placeholder="Type your message…" autocomplete="off" />
    <button id="send" aria-label="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <nav class="bottom-nav">
    <a href="/app/dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-7h4v7h4a1 1 0 0 0 1-1V10"/></svg>
      Home
    </a>
    <a href="/app/claims.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
      Claims
    </a>
    <a href="/app/support.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Support
    </a>
    <a href="/app/profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
<script src="backend.js"></script>
<script src="state.js"></script>
<script src="connector.js"></script>
<script>
(function () {
  'use strict';

  var thread = document.getElementById('thread');
  var input = document.getElementById('msg');
  var sendBtn = document.getElementById('send');
  var HISTORY = [];

  function addBubble(text, who) {
    var b = document.createElement('div');
    b.className = 'bubble ' + (who === 'agent' ? 'bubble-agent' : 'bubble-user');
    b.textContent = text;
    thread.appendChild(b);
    thread.scrollTop = thread.scrollHeight;
    return b;
  }

  function addTyping() {
    var b = document.createElement('div');
    b.className = 'bubble bubble-agent typing';
    b.innerHTML = '<span></span><span></span><span></span>';
    thread.appendChild(b);
    thread.scrollTop = thread.scrollHeight;
    return b;
  }

  function fallbackReply(text) {
    var t = text.toLowerCase();
    if (t.indexOf('document') !== -1)  return "You'll need: a clear photo of your insurance card (front + back), the dental receipt with the procedure breakdown, and a valid US ID. Most submissions take less than 2 minutes once you have those handy.";
    if (t.indexOf('long') !== -1 || t.indexOf('time') !== -1)
      return "Most insurers acknowledge a claim within 1–2 business days, then take 2–6 weeks to process. We email you the moment they move it forward — no waiting on hold.";
    if (t.indexOf('secure') !== -1 || t.indexOf('safe') !== -1 || t.indexOf('data') !== -1)
      return "All your data is encrypted in transit and at rest. We're HIPAA-aware and only the documents required for your claim are stored. You can request deletion any time from your Profile.";
    if (t.indexOf('specialist') !== -1 || t.indexOf('human') !== -1 || t.indexOf('person') !== -1)
      return "Sure — text a Credimed specialist on WhatsApp at +1 (512) 555-0134. Mon–Fri 9am–6pm CT.";
    if (t.indexOf('refund') !== -1 || t.indexOf('how much') !== -1)
      return "Your refund estimate is based on your insurance plan's typical out-of-network coverage. You can see a fresh estimate any time from your dashboard.";
    if (t.indexOf('hello') !== -1 || t.indexOf('hi') !== -1 || t.indexOf('hola') !== -1)
      return "¡Hola! Estoy aquí para ayudarte. Cuéntame qué necesitas saber.";
    return "Thanks — I've got that. A specialist will follow up by email within a few hours, or you can reach us on WhatsApp at +1 (512) 555-0134.";
  }

  async function sendMessage(text) {
    if (!text || !text.trim()) return;
    text = text.trim();
    addBubble(text, 'user');
    HISTORY.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;

    var typing = addTyping();

    var reply = null;

    // Try the agents Lambda first.
    try {
      if (window.authFetch && window.CREDIMED_API) {
        var ctx = {};
        try {
          var S = window.CredimedState;
          var claim = S ? S.get('claim', null) : null;
          if (claim && claim.id) {
            ctx.claimId = claim.id;
            ctx.claimStatus = claim.status;
          }
        } catch (e) {}

        var resp = await window.authFetch(window.CREDIMED_API + '/agents', {
          method: 'POST',
          body: { agent: 'ana', message: text, history: HISTORY.slice(-10), context: ctx }
        });
        if (resp && resp.ok) {
          var data = await resp.json();
          reply = data.reply || data.message || data.text;
        }
      }
    } catch (e) {
      console.info('[support] agent backend skipped:', e.message || e);
    }

    if (!reply) reply = fallbackReply(text);

    typing.remove();
    setTimeout(function () {
      addBubble(reply, 'agent');
      HISTORY.push({ role: 'assistant', content: reply });
      sendBtn.disabled = false;
      input.focus();
    }, 450);
  }

  document.querySelectorAll('.chip').forEach(function (c) {
    c.addEventListener('click', function () {
      sendMessage(c.getAttribute('data-msg'));
    });
  });

  sendBtn.addEventListener('click', function () { sendMessage(input.value); });
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  input.focus();
})();
</script>
<script src="auto-logoff.js"></script>
</body>
</html>
