<!DOCTYPE html>
<html lang="en">
<head>
<!-- Stripe preload — starts downloading Stripe.js and warming the
     connection to api.stripe.com the moment the user hits the plan
     screen. By the time they walk through before-sign + agreement +
     signature (~30-60 seconds of reading), both the JS and the
     PaymentIntent (see prefetch script at the bottom of this file)
     are fully cached — payment.html mounts the Payment Element with
     zero extra network delay. -->
<link rel="preconnect" href="https://js.stripe.com" crossorigin>
<link rel="preconnect" href="https://api.stripe.com" crossorigin>
<link rel="dns-prefetch" href="https://js.stripe.com">
<script async src="https://js.stripe.com/v3/"></script>
<style id="credimed-prod-overrides">
/* Credimed production mode: hide Claude Design dev chrome.
   Add ?dev=1 to URL to reveal it (see script below). */
.topbar,
.device-label,
.chrome,
.design-canvas,
.tweak-row,
.tweak-label,
.tweak-seg { display: none !important; }
/* Mobile (<768px): show the mobile device-wrap, hide the desktop one */
@media (max-width: 767px) {
  .device-wrap:nth-of-type(2) { display: none !important; }
  .device-wrap:nth-of-type(1) { margin: 0 auto !important; padding: 0 !important; width: 100% !important; max-width: 480px !important; }
}
/* Desktop (>=768px): hide mobile, show the desktop variant (Claude Design built it) */
@media (min-width: 768px) {
  .device-wrap:nth-of-type(1) { display: none !important; }
  .device-wrap:nth-of-type(2) { margin: 40px auto !important; padding: 0 !important; max-width: 960px !important; }
}
.iphone, .desktop {
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 100% !important;
  max-width: 480px !important;
  min-height: 100vh !important;
  height: auto !important;
}
.stage, .proto-tab, .proto-stage {
  padding: 0 !important;
  background: #FAF6EF !important;
  min-height: 100vh !important;
  display: block !important;
}
.screen {
  width: 100% !important;
  max-width: 100% !important;
  min-height: auto !important;
  height: auto !important;
  border-radius: 0 !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}
html, body { background: #FAF6EF !important; margin: 0 !important; padding: 0 !important; }
/* Safe-area: push hero content below the iPhone Dynamic Island / notch */
.hero { padding-top: calc(24px + env(safe-area-inset-top)) !important; }
/* Hide the fake iPhone Dynamic Island notch that Claude Design draws inside .iphone */
.iphone::before { display: none !important; }

/* Desktop (>=768px): reveal the Claude Design desktop variant; strip its browser chrome */
@media (min-width: 768px) {
  html, body {
    background:
      radial-gradient(ellipse at top left, rgba(13,148,136,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(94,234,212,0.05), transparent 50%),
      #FAF6EF !important;
  }
  .stage, .proto-tab, .proto-stage {
    min-height: 100vh !important;
    padding: 40px 20px !important;
    display: flex !important;
    justify-content: center !important;
    align-items: flex-start !important;
  }
  .desktop {
    width: auto !important;
    max-width: 960px !important;
    min-height: auto !important;
    border-radius: 20px !important;
    box-shadow: 0 24px 64px rgba(15,23,42,0.14), 0 4px 16px rgba(15,23,42,0.06) !important;
    overflow: hidden !important;
  }
  .desktop .chrome { display: none !important; }
  .desktop .body {
    height: auto !important;
    min-height: auto !important;
  }
}
</style>
<script>
/* Reveal dev chrome with ?dev=1 for design reviews */
if (location.search.indexOf("dev=1") >= 0) {
  document.addEventListener("DOMContentLoaded", function () {
    var s = document.getElementById("credimed-prod-overrides");
    if (s) s.disabled = true;
  });
}
</script>
<meta charset="UTF-8">
<title>Credimed — Pick your plan</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root {
  --teal-50: #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-200: #99F6E4;
  --teal-300: #5EEAD4;
  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0B8278;
  --teal-800: #0A7A70;
  --teal-900: #134E4A;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;
  --hero-gradient: linear-gradient(160deg, #0f172a 0%, #134e4a 60%, #0D9488 100%);
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-ui);
  color: var(--slate-900);
  background: #FAF6EF;
  -webkit-font-smoothing: antialiased;
}

/* ---- Toolbar ---- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 56px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px) saturate(180%);
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.14em; color: var(--slate-900);
}
.brand .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--teal-600); }
.tabs { display: flex; gap: 4px; background: var(--slate-100); padding: 4px; border-radius: 999px; }
.tab {
  padding: 7px 12px; border-radius: 999px; border: none;
  background: transparent; font-weight: 600; font-size: 12px;
  color: var(--slate-600); cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.tab.active { background: var(--slate-900); color: white; }
.meta { font-size: 12px; color: var(--slate-500); font-weight: 500; }

/* ---- Stage ---- */
.stage {
  min-height: 100vh;
  padding-top: 80px; padding-bottom: 48px;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 48px; flex-wrap: wrap;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(94,234,212,0.08), transparent 55%),
    #FAF6EF;
}
.device-wrap { position: relative; }
.device-label {
  position: absolute; top: -32px; left: 0;
  font-size: 12px; font-weight: 600; color: var(--slate-500);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* iPhone */
.iphone {
  width: 390px; height: 810px;
  background: #0f172a;
  border-radius: 52px; padding: 10px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.22), 0 6px 16px rgba(15,23,42,0.1);
  position: relative; flex-shrink: 0;
}
.iphone::before {
  content: ""; position: absolute; top: 18px; left: 50%;
  transform: translateX(-50%); width: 110px; height: 28px;
  background: #020617; border-radius: 999px; z-index: 10;
}
.iphone .screen {
  width: 100%; height: 100%;
  background: #FAF6EF; border-radius: 42px;
  overflow: hidden; overflow-y: auto;
  position: relative;
  scrollbar-width: none;
}
.iphone .screen::-webkit-scrollbar { display: none; }

/* Desktop */
.desktop {
  width: 920px;
  background: white; border-radius: 16px;
  box-shadow: 0 30px 80px rgba(15,23,42,0.18), 0 6px 16px rgba(15,23,42,0.08);
  overflow: hidden; display: flex; flex-direction: column;
  flex-shrink: 0;
}
.desktop .chrome {
  height: 44px; background: #f8fafc;
  border-bottom: 1px solid var(--slate-200);
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.chrome .dots { display: flex; gap: 6px; }
.chrome .dot { width: 11px; height: 11px; border-radius: 999px; }
.chrome .dot.r { background: #fc615d; } .chrome .dot.y { background: #fcbb40; } .chrome .dot.g { background: #34c749; }
.chrome .url {
  flex: 1; margin-left: 12px; height: 26px;
  background: white; border: 1px solid var(--slate-200);
  border-radius: 8px; padding: 0 12px;
  display: flex; align-items: center; font-size: 12px;
  color: var(--slate-500); gap: 8px;
}
.desktop .body {
  min-height: 760px;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(13,148,136,0.05), transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(94,234,212,0.06), transparent 55%),
    #f8fafc;
  overflow-y: auto;
}
.desktop-inner { width: 100%; }

/* ---- Hero ---- */
.hero {
  position: relative;
  background: var(--hero-gradient);
  color: white;
  padding: 22px 24px 32px;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; inset: -40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.25), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.35), transparent 55%);
  pointer-events: none;
}
.hero-top {
  position: relative; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 20px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: white; display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(6px);
}
.logo-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px 8px 10px; border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
}
.logo-badge .circle {
  width: 28px; height: 28px; border-radius: 999px; background: white;
  display: flex; align-items: center; justify-content: center;
}
.logo-badge .text {
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.14em; color: white;
}
.hero-eyebrow {
  position: relative;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--teal-300);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.hero-title {
  position: relative;
  font-size: 26px; font-weight: 700; line-height: 1.15;
  letter-spacing: -0.02em; margin: 0 0 10px;
  max-width: 420px;
}
.hero-sub {
  position: relative;
  font-size: 13.5px; color: rgba(255,255,255,0.75);
  line-height: 1.5;
  margin: 0 0 18px;
  max-width: 420px;
}
.progress {
  position: relative;
  display: flex; gap: 6px;
}
.progress-seg {
  flex: 1; height: 4px; border-radius: 999px;
  background: rgba(255,255,255,0.18);
}
.progress-seg.active {
  background: linear-gradient(90deg, var(--teal-300), var(--teal-400));
}
.progress-label {
  position: relative;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.72);
  margin-top: 10px;
  letter-spacing: 0.02em;
}

/* ---- Body ---- */
.body-wrap {
  padding: 24px 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.desktop .body-wrap {
  padding: 32px 40px 40px;
  max-width: 880px;
  margin: 0 auto;
}

/* ---- Plan cards ---- */
.plan-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.desktop .plan-grid {
  flex-direction: row;
  align-items: stretch;
  gap: 18px;
}

.plan-card {
  background: white;
  border-radius: 20px;
  padding: 22px 20px;
  border: 1.5px solid var(--slate-200);
  display: flex;
  flex-direction: column;
  position: relative;
  transition: all 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
  cursor: pointer;
}
.desktop .plan-card { flex: 1; padding: 26px 24px; }

.plan-card:hover:not(.selected):not(.dimmed) {
  border-color: var(--slate-300);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px -12px rgba(15,23,42,0.12);
}

.plan-card.plus {
  border-color: var(--teal-300);
  box-shadow: 0 12px 40px -16px rgba(13,148,136,0.28);
}
.plan-card.plus:hover:not(.selected):not(.dimmed) {
  border-color: var(--teal-400);
  box-shadow: 0 18px 48px -16px rgba(13,148,136,0.36);
}

.plan-card.selected {
  border-color: var(--teal-600);
  box-shadow:
    0 0 0 4px rgba(13,148,136,0.15),
    0 18px 48px -16px rgba(13,148,136,0.36);
}
.plan-card.dimmed {
  opacity: 0.55;
  filter: grayscale(0.15);
}

/* "Most popular" badge */
.badge-pop {
  position: absolute;
  top: -11px; right: 16px;
  background: var(--teal-600);
  color: white;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.14em;
  padding: 5px 10px;
  border-radius: 999px;
  box-shadow: 0 6px 16px rgba(13,148,136,0.35);
  display: inline-flex; align-items: center; gap: 5px;
  text-transform: uppercase;
}
.badge-pop .star {
  width: 10px; height: 10px;
}

/* Selected indicator (top-right) */
.badge-selected {
  position: absolute;
  top: -11px; right: 16px;
  background: var(--teal-600);
  color: white;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.14em;
  padding: 5px 10px 5px 8px;
  border-radius: 999px;
  box-shadow: 0 6px 16px rgba(13,148,136,0.35);
  display: inline-flex; align-items: center; gap: 5px;
  text-transform: uppercase;
}
.badge-selected svg { width: 11px; height: 11px; }

.plan-header { margin-bottom: 14px; }
.plan-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--slate-900);
  margin: 0 0 3px;
}
.plan-card.plus .plan-title { color: var(--teal-800); }

.plan-subtitle {
  font-size: 13px;
  color: var(--slate-500);
  margin: 0;
  font-weight: 500;
}

.plan-price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin: 10px 0 20px;
  padding-bottom: 18px;
  border-bottom: 1px dashed var(--slate-200);
}
.plan-price {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -0.035em;
  color: var(--slate-900);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  display: inline-flex;
  align-items: baseline;
}
.plan-price .currency {
  font-size: 26px;
  font-weight: 700;
  margin-right: 1px;
  color: var(--slate-500);
}
.plan-card.plus .plan-price { color: var(--teal-700); }
.plan-card.plus .plan-price .currency { color: var(--teal-600); }

.plan-price-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--slate-500);
  padding-bottom: 4px;
  letter-spacing: 0.02em;
}

/* Bullet list */
.feature-list {
  list-style: none;
  padding: 0;
  margin: 0 0 18px;
  display: flex;
  flex-direction: column;
  gap: 11px;
  flex: 1;
}
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13.5px;
  color: var(--slate-700);
  line-height: 1.4;
}
.feature-item .check-circle {
  flex-shrink: 0;
  width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--teal-50);
  color: var(--teal-700);
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.plan-card.plus .feature-item .check-circle {
  background: var(--teal-600);
  color: white;
}
.feature-item.muted {
  color: var(--slate-500);
}
.feature-item.muted .check-circle {
  background: var(--slate-100);
  color: var(--slate-400);
}
.feature-item b {
  color: var(--slate-900);
  font-weight: 700;
}
.plan-card.plus .feature-item b {
  color: var(--teal-800);
}

/* Best-if block */
.best-if {
  margin-top: auto;
  padding: 12px 14px;
  background: var(--slate-100);
  border-radius: 12px;
  font-size: 12.5px;
  color: var(--slate-600);
  line-height: 1.45;
}
.best-if b {
  color: var(--slate-900);
  font-weight: 700;
  display: block;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.plan-card.plus .best-if {
  background: var(--teal-50);
  color: var(--teal-900);
}
.plan-card.plus .best-if b { color: var(--teal-700); }

/* CTA */
.plan-cta {
  margin-top: 18px;
  width: 100%;
  height: 48px;
  border-radius: 12px;
  border: 1.5px solid var(--slate-300);
  background: white;
  color: var(--slate-900);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.plan-cta:hover:not(:disabled) {
  background: var(--slate-100);
  border-color: var(--slate-400);
}
.plan-cta.primary {
  background: var(--teal-600);
  color: white;
  border-color: var(--teal-600);
  box-shadow: 0 6px 18px rgba(13,148,136,0.28);
}
.plan-cta.primary:hover:not(:disabled) {
  background: var(--teal-800);
  border-color: var(--teal-800);
  box-shadow: 0 10px 24px rgba(13,148,136,0.36);
  transform: translateY(-1px);
}
.plan-cta.primary .arrow { transition: transform 150ms ease; }
.plan-cta.primary:hover:not(:disabled) .arrow { transform: translateX(3px); }

/* ---- Comparison link + table ---- */
.compare-block {
  background: white;
  border: 1px solid var(--slate-200);
  border-radius: 16px;
  overflow: hidden;
}
.compare-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--slate-800);
  text-align: left;
  transition: background 150ms ease;
}
.compare-trigger:hover { background: var(--slate-100); }
.compare-trigger .chev {
  width: 20px; height: 20px;
  color: var(--slate-500);
  transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.compare-block.open .chev { transform: rotate(180deg); }

.compare-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.compare-block.open .compare-body {
  grid-template-rows: 1fr;
}
.compare-body-inner {
  overflow: hidden;
}

.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border-top: 1px solid var(--slate-200);
}
.compare-table th {
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--slate-500);
  text-align: left;
  padding: 12px 16px;
  background: var(--slate-100);
}
.compare-table th.plus-col { color: var(--teal-700); text-align: center; }
.compare-table th.basic-col { text-align: center; }
.compare-table td {
  padding: 12px 16px;
  border-top: 1px solid var(--slate-200);
  vertical-align: middle;
}
.compare-table td.feat {
  color: var(--slate-700);
  font-weight: 500;
  width: 56%;
}
.compare-table td.val {
  text-align: center;
  color: var(--slate-900);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.compare-table td.val.plus-val {
  background: rgba(13,148,136,0.03);
  color: var(--teal-800);
}
.check-green {
  display: inline-flex;
  width: 20px; height: 20px;
  border-radius: 999px;
  background: var(--teal-50);
  color: var(--teal-700);
  align-items: center; justify-content: center;
  margin: 0 auto;
}
.plus-val .check-green {
  background: var(--teal-600); color: white;
}
.dash-muted {
  color: var(--slate-400);
  font-weight: 600;
}

/* Trust row */
.trust-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 11px; color: var(--slate-500);
  font-weight: 500;
  flex-wrap: wrap;
  padding: 12px 0 0;
}
.trust-row .dot-sep { color: var(--slate-300); }
.trust-row svg { flex-shrink: 0; }

/* Footer CTA — mobile only (sticky continue appears when a plan is selected) */
.footer-cta {
  padding: 16px 20px 22px;
  background: white;
  border-top: 1px solid var(--slate-200);
  box-shadow: 0 -8px 24px -12px rgba(15,23,42,0.08);
  position: static; border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.footer-cta .inline-summary {
  font-size: 12px;
  color: var(--slate-500);
}
.footer-cta .inline-summary b {
  color: var(--slate-900);
  font-weight: 700;
}
.btn-primary {
  width: 100%; height: 54px;
  border-radius: 14px;
  background: var(--teal-600);
  color: white; border: none;
  font-weight: 700; font-size: 15px;
  cursor: pointer;

<script>
const ICONS = {

  mark: '<svg width="18" height="18" viewBox="0 0 32 32"><path d="M 11 10 L 11 21 M 21 10 L 21 21" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/><circle cx="16" cy="15" r="2.5" fill="#0D9488"/></svg>',

  minus: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>',

  lock: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',

const PLANS = {
  basic: {
    id: 'basic',
    title: 'Basic',
    subtitle: 'For straightforward claims',
    price: 29,
    features: [
      { text: '1 claim submission' },
      { text: 'Up-front written refund estimate' },
      { text: 'Spanish receipt translation' },
      { text: 'Insurer pays you directly' },
      { text: 'Resubmissions handled manually by our team', muted: true, icon: 'minus' },
    ],
    bestIf: "You have all your docs — receipt, itemized procedures, x-rays if any.",
    cta: 'Choose Basic',
  },
  plus: {
    id: 'plus',
    title: 'Plus',
    subtitle: 'Peace of mind · recommended',
    price: 39,
    features: [
      { text: '<b>Unlimited</b> claim resubmissions' },
      { text: 'Up-front written refund estimate' },
      { text: 'Spanish receipt translation' },
      { text: 'Insurer pays you directly' },
      { text: 'If denied or needs more docs, <b>we handle it at no extra cost</b>' },
      { text: 'HIPAA-compliant document handling' },
    ],
    bestIf: "You want zero risk of paying more.",
    cta: 'Choose Plus',
  },
};

const COMPARISON_ROWS = [
  { feat: 'Claim submissions',             basic: '1',     plus: 'Unlimited', emphasize: true },
  { feat: 'Up-front refund estimate',      basic: 'check', plus: 'check' },
  { feat: 'Spanish receipt translation',   basic: 'check', plus: 'check' },
  { feat: 'Direct insurer payment',        basic: 'check', plus: 'check' },
  { feat: 'Resubmission if denied',        basic: 'One included', plus: 'Unlimited' },
  { feat: 'Missing-document support',      basic: 'dash',  plus: 'check' },
  { feat: 'HIPAA-compliant handling',      basic: 'check', plus: 'check' },
  { feat: 'Priority claim handling',       basic: 'dash',  plus: 'check' },
  { feat: 'Support via Sofia (WhatsApp)',  basic: 'check', plus: 'check' },
];

function featureListHtml(plan, variantClass) {
  return `
    <ul class="feature-list">
      ${plan.features.map(f => {
        const icon = f.icon === 'minus'
          ? `<span class="check-circle">${ICONS.minus}</span>`
          : `<span class="check-circle">${ICONS.check}</span>`;
        return `<li class="feature-item ${f.muted ? 'muted' : ''}">${icon}<span>${f.text}</span></li>`;
      }).join('')}
    </ul>
  `;
}

function planCardHtml(plan, opts) {
  const { selected, dimmed, isPlus } = opts;
  const classes = [
    'plan-card',
    isPlus ? 'plus' : '',
    selected ? 'selected' : '',
    dimmed ? 'dimmed' : '',
  ].filter(Boolean).join(' ');

  // Badge: "Most popular" on Plus when nothing selected;
  // "Selected" on whichever card is selected.
  let badge = '';
  if (selected) {
    badge = `<span class="badge-selected">${ICONS.checkSm} Selected</span>`;
  } else if (isPlus) {
    badge = `<span class="badge-pop"><span class="star">${ICONS.star}</span> Most popular</span>`;
  }

  // CTA label + style depends on state
  let ctaLabel, ctaClass;
  if (selected) {
    ctaLabel = `Continue with ${plan.title}`;
    ctaClass = 'plan-cta primary';
  } else if (isPlus) {
    ctaLabel = plan.cta;
    ctaClass = 'plan-cta primary';
  } else {
    ctaLabel = plan.cta;
    ctaClass = 'plan-cta';
  }

  return `
    <div class="${classes}" data-plan="${plan.id}">
      ${badge}
      <div class="plan-header">
        <h3 class="plan-title">${plan.title}</h3>
        <p class="plan-subtitle">${plan.subtitle}</p>

      <div class="plan-price-row">
        <span class="plan-price"><span class="currency">$</span>${plan.price}</span>
        <span class="plan-price-label">one-time</span>
      </div>
      ${featureListHtml(plan)}
      <div class="best-if">
        <b>Best if</b>
        ${plan.bestIf}
      </div>
      <button class="${ctaClass}" data-plan-cta="${plan.id}">
        <span>${ctaLabel}</span>
        ${ selected ? '<span class="arrow">→</span>' : '' }
      </button>
    </div>
  `;
}

function compareTableHtml() {
  const cell = (v, isPlus) => {
    if (v === 'check') return `<span class="check-green">${ICONS.checkSm}</span>`;
    if (v === 'dash')  return `<span class="dash-muted">—</span>`;
    return v;
  };
  return `
    <table class="compare-table">
      <thead>
        <tr>
          <th class="feat-col">Feature</th>
          <th class="basic-col">Standard · $49</th>
          <th class="plus-col">Premium · $99</th>
        </tr>
      </thead>
      <tbody>
        ${COMPARISON_ROWS.map(r => `
          <tr>
            <td class="feat">${r.feat}</td>
            <td class="val">${cell(r.basic, false)}</td>
            <td class="val plus-val">${cell(r.plus, true)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderScreen(variantKey) {
  const selected = variantKey === 'selected' ? 'plus' : null;
  const compareOpen = variantKey === 'compare';

  const progressSegs = [
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg"></div>',
  ].join('');

  const basicCard = planCardHtml(PLANS.basic, {
    selected: selected === 'basic',
    dimmed: selected && selected !== 'basic',
    isPlus: false,

  const plusCard = planCardHtml(PLANS.plus, {
    selected: selected === 'plus',
    dimmed: selected && selected !== 'plus',
    isPlus: true,
  });

  const footerCta = selected
    ? `
      <div class="footer-cta">
        <div class="inline-summary">
          <b>${PLANS[selected].title}</b> · $${PLANS[selected].price} · one-time charge
        </div>
        <button class="btn-primary">
          <span>Continue with ${PLANS[selected].title}</span>
          <span class="arrow">→</span>
        </button>
      </div>
    `
    : '';

  return `
    <div class="hero">
      <div class="hero-top">
        <button class="back-btn" aria-label="Back">${ICONS.back}</button>
        <div class="logo-badge">
          <span class="circle">${ICONS.mark}</span>
          <span class="text">CREDIMED</span>
        </div>
        <span style="width:36px"></span>
      </div>
      <div class="hero-eyebrow">Choose your plan</div>
      <h1 class="hero-title">Pick the plan that fits your claim</h1>
      <p class="hero-sub">One-time fee · your insurer pays you directly · we never take a cut of your refund.</p>
      <div class="progress">${progressSegs}</div>
      <div class="progress-label">Step 3 of 4 · Choose plan</div>
    </div>
    <div class="body-wrap">
      <div class="plan-grid">
        ${basicCard}
        ${plusCard}
      </div>

      <div class="compare-block ${compareOpen ? 'open' : ''}" data-compare>
        <button class="compare-trigger" data-compare-trigger>
          <span>See full comparison</span>
          <span class="chev">${ICONS.chev}</span>
        </button>
        <div class="compare-body">
          <div class="compare-body-inner">
            ${compareTableHtml()}
          </div>
        </div>
      </div>

      <div class="trust-row">
        ${ICONS.shield} HIPAA-ready
        <span class="dot-sep">·</span>
        ${ICONS.lock} 256-bit encrypted
        <span class="dot-sep">·</span>
        US-incorporated
      </div>
    </div>
    ${footerCta}
  `;
}

let activeVariant = 'default';

function mount() {
  document.getElementById('screen-mobile').innerHTML = renderScreen(activeVariant);
  document.getElementById('screen-desktop').innerHTML = renderScreen(activeVariant);
  wire();
}

function wire() {
  // Toggling a plan card from "default" to that plan's selected state
  document.querySelectorAll('[data-plan-cta]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-plan-cta');
      // Persist plan selection so payment.html can read it.
      // Map legacy ids: plus -> premium, basic -> standard
      try {
        var planKey = (id === 'plus' || id === 'premium') ? 'premium' : 'standard';
        if (window.CredimedState) window.CredimedState.set('plan.selected', planKey);
      } catch (err) {}
      // Only "Plus selected" is a predefined tab; if the user clicks Basic's CTA,
      // we still visualize a selected Basic state for preview.
      activeVariant = 'selected';
      // Swap the selected plan by rebinding a one-off render
      const customHtmlMobile = renderScreenCustom(id, false);
      const customHtmlDesktop = renderScreenCustom(id, false);
      document.getElementById('screen-mobile').innerHTML = customHtmlMobile;
      document.getElementById('screen-desktop').innerHTML = customHtmlDesktop;
      // Update tab state
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelector('[data-variant="selected"]').classList.add('active');
      wire();
    });
  });

  document.querySelectorAll('[data-compare-trigger]').forEach(btn => {
    btn.addEventListener('click', () => {
      const block = btn.closest('[data-compare]');
      block.classList.toggle('open');
    });
  });
}

function renderScreenCustom(selectedId, compareOpen) {
  const progressSegs = [
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg active"></div>',
    '<div class="progress-seg"></div>',
  ].join('');

  const basicCard = planCardHtml(PLANS.basic, {
    selected: selectedId === 'basic',
    dimmed: selectedId && selectedId !== 'basic',
    isPlus: false,
  });
  const plusCard = planCardHtml(PLANS.plus, {
    selected: selectedId === 'plus',
    dimmed: selectedId && selectedId !== 'plus',
    isPlus: true,
  });

  const footerCta = selectedId
    ? `
      <div class="footer-cta">
        <div class="inline-summary">
          <b>${PLANS[selectedId].title}</b> · $${PLANS[selectedId].price} · one-time charge
        </div>
        <button class="btn-primary">
          <span>Continue with ${PLANS[selectedId].title}</span>
          <span class="arrow">→</span>
        </button>
      </div>
    `
    : '';

  return `
    <div class="hero">
      <div class="hero-top">
        <button class="back-btn" aria-label="Back">${ICONS.back}</button>
        <div class="logo-badge">
          <span class="circle">${ICONS.mark}</span>
          <span class="text">CREDIMED</span>
        </div>
        <span style="width:36px"></span>
      </div>
      <div class="hero-eyebrow">Choose your plan</div>
      <h1 class="hero-title">Pick the plan that fits your claim</h1>
      <p class="hero-sub">One-time fee · your insurer pays you directly · we never take a cut of your refund.</p>
      <div class="progress">${progressSegs}</div>
      <div class="progress-label">Step 3 of 4 · Choose plan</div>
    </div>
    <div class="body-wrap">
      <div class="plan-grid">${basicCard}${plusCard}</div>
      <div class="compare-block ${compareOpen ? 'open' : ''}" data-compare>
        <button class="compare-trigger" data-compare-trigger>
          <span>See full comparison</span>
          <span class="chev">${ICONS.chev}</span>
        </button>
        <div class="compare-body">
          <div class="compare-body-inner">
            ${compareTableHtml()}
          </div>
        </div>
      </div>
      <div class="trust-row">
        ${ICONS.shield} HIPAA-ready
        <span class="dot-sep">·</span>
        ${ICONS.lock} 256-bit encrypted
        <span class="dot-sep">·</span>
        US-incorporated
      </div>
    </div>
    ${footerCta}
  `;
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeVariant = t.getAttribute('data-variant');
    mount();
  });
});

mount();
</script>

<script>
/* ---- Pricing overlay (spec: one tier, one price, one button) ----
   documents.html writes credimed_plan / credimed_price / credimed_explanation
   to sessionStorage after the real OCR + engine run. This overlay waits
   for the Claude Design mount() to finish rendering the Basic/Plus
   mockup, then replaces #screen-mobile and #screen-desktop with a
   single-card layout for the engine-computed tier. If sessionStorage
   is empty (standalone design review), the mockup stays untouched. */
(function () {
  var plan, price, bullets;
  /* Prefer CredimedState (localStorage, persistent). Fall back to
     sessionStorage only if CredimedState doesn't have it yet. */
  var cs = (window.CredimedState && window.CredimedState.get('pricing', null)) || null;
  if (cs && cs.plan && cs.price > 0) {
    plan = cs.plan;
    price = cs.price;
    bullets = Array.isArray(cs.explanation) ? cs.explanation : [];
  } else {
    try {
      plan = sessionStorage.getItem('credimed_plan');
      price = parseInt(sessionStorage.getItem('credimed_price'), 10);
      var rawExp = sessionStorage.getItem('credimed_explanation');
      bullets = rawExp ? (JSON.parse(rawExp) || []) : [];
    } catch (e) { return; }
  }
  if (!plan || !(price > 0)) return;

  /* Refund range from the estimate screen (persisted by estimate.html
     into CredimedState.estimate — that's where the value actually lives
     even though the spec said sessionStorage). Only refundMax is used
     now, in the CTA's 'up to $X' framing. */
  var est = (window.CredimedState && window.CredimedState.get('estimate', null)) || null;
  var refundMax = (est && est.rangeMax > 0) ? est.rangeMax : null;

  /* CTA varies only on whether we have a refundMax anchor. With the
     range present we bake the 'up to $X' callout into the button text
     and drop the separate arrow span since → is already in the copy.
     Without it, we fall back to the simpler 'Start my claim — $X' with
     the standalone arrow. */
  var ctaHtml = refundMax
    ? '<button class="btn-primary">' +
        '<span>Start my refund (up to $' + refundMax + ') → $' + price + '</span>' +
      '</button>'
    : '<button class="btn-primary">' +
        '<span>Start my claim — $' + price + '</span>' +
        '<span class="arrow">→</span>' +
      '</button>';

  /* Pre-CTA reassurance block: social proof + small insurer disclaimer.
     Post-CTA: short 'no submission = no charge' guarantee, then trust
     strip. All rendered inside the existing .footer-cta container so
     the sticky bottom area holds the full decision context. */
  var preCtaHtml =
    '<div style="text-align:center;padding:0 4px">' +
      '<div style="font-size:13px;color:var(--slate-700,#334155);font-weight:500;line-height:1.4">' +
        'Most patients like you recover $150–$250 — without dealing with insurance' +
      '</div>' +
      '<div style="font-size:11.5px;color:var(--slate-500,#64748b);margin-top:2px;line-height:1.4">' +
        'Final amount confirmed by your insurer' +
      '</div>' +
    '</div>';

  var guaranteeHtml =
    '<div style="font-size:11.5px;color:var(--slate-500,#64748b);text-align:center;line-height:1.45;padding:0 8px">' +
      'No submission = no charge' +
    '</div>';

  var trustStripHtml =
    '<div class="trust-row">' +
      '<span>HIPAA-ready</span>' +
      '<span class="dot-sep">·</span>' +
      '<span>Secure</span>' +
      '<span class="dot-sep">·</span>' +
      '<span>US-based company</span>' +
    '</div>';

  var tierTitle = plan.charAt(0).toUpperCase() + plan.slice(1);
  var checkSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var backSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';

  var bulletsHtml = (bullets.slice(0, 3)).map(function (b) {
    return '<div class="feature-item">' +
             '<div class="check-circle">' + checkSvg + '</div>' +
             '<span>' + b + '</span>' +
           '</div>';
  }).join('');

  /* Read the OCR-extracted procedures from the receipt so the user sees
     the concrete treatments Credimed is helping them recover — makes the
     price feel tied to their actual claim, not an abstract tier. */
  var receipt = (window.CredimedState && window.CredimedState.get('receipt', {})) || {};
  var procedures = Array.isArray(receipt.procedures) ? receipt.procedures : [];
  var proceduresBlock = '';
  if (procedures.length) {
    var procItems = procedures.map(function (p) {
      return '<div style="display:flex;align-items:flex-start;gap:8px;margin:5px 0;font-size:13.5px;line-height:1.4;color:var(--slate-800,#1e293b)">' +
               '<span style="color:var(--teal-600,#0D9488);font-weight:700;flex-shrink:0">✓</span>' +
               '<span>' + p + '</span>' +
             '</div>';
    }).join('');
    proceduresBlock =
      '<div style="margin:14px 16px 0;padding:14px 16px;background:var(--teal-50,#F0FDFA);border:1px solid var(--teal-200,#99F6E4);border-radius:12px">' +
        '<div style="color:var(--teal-800,#0A7A70);text-transform:uppercase;font-size:10.5px;letter-spacing:.6px;font-weight:700;margin-bottom:8px">' +
          "What we're submitting for" +
        '</div>' +
        procItems +
      '</div>';
  }

  function singleCardHtml() {
    return (
      '<div class="hero">' +
        '<div class="hero-top"><button class="back-btn" aria-label="Back">' + backSvg + '</button></div>' +
        '<div class="hero-eyebrow">Your recommended plan</div>' +
        '<h1 class="hero-title">' + tierTitle + ' is the right fit for your claim</h1>' +
        '<p class="hero-sub">Pay once to recover your refund<br>Your insurer pays you directly · we never take a cut</p>' +
      '</div>' +
      '<div style="padding:0 16px">' +
        '<div class="plan-card plus selected" style="margin-top:8px">' +
          '<div class="plan-title">' + tierTitle + '</div>' +
          '<div class="plan-subtitle">Recommended for your claim</div>' +
          '<div class="plan-price">' +
            '<span class="currency">$</span>' +
            '<span class="amount">' + price + '</span>' +
            '<span class="dot">·</span>' +
            '<span class="one-time">one-time</span>' +
          '</div>' +
          '<div class="features">' + bulletsHtml + '</div>' +
        '</div>' +
      '</div>' +
      proceduresBlock +
      '<div class="footer-cta">' +
        preCtaHtml +
        ctaHtml +
        guaranteeHtml +
        trustStripHtml +
      '</div>'
    );
  }

  function apply() {
    var mob = document.getElementById('screen-mobile');
    var desk = document.getElementById('screen-desktop');
    var html = singleCardHtml();
    if (mob) mob.innerHTML = html;
    if (desk) desk.innerHTML = html;
    /* Kill the variant tabs — no choice UI per spec. */
    document.querySelectorAll('.tab').forEach(function (t) { t.style.display = 'none'; });
    /* Persist selection so payment.html reads the right tier from state. */
    if (window.CredimedState) window.CredimedState.set('plan.selected', plan);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', apply);
  } else {
    apply();
  }
})();
</script>

<script>
/* ---- EARLY Stripe PaymentIntent prefetch ----
   Fires the moment the user lands on the plan screen (pricing engine has
   already run, plan is in CredimedState). Runs Lambda → Stripe round-trip
   while the user reads the plan card, before-sign warnings, the agreement
   drawer, and captures their signature (~30-60 seconds of runway). By the
   time they click 'Pay', pendingPaymentIntent.clientSecret is already
   cached — payment.html uses it synchronously.

   If this fails (Lambda down, no plan state yet, etc.), agreement.html
   has a second prefetch attempt as a safety net. Payment.html falls back
   to its own createPaymentIntent if neither prefetch landed. Silent
   failure — user never sees an error. */
(function () {
  try {
    if (!window.CredimedState) return;
    var pricing = window.CredimedState.get('pricing', null);
    if (!pricing || !pricing.plan) return;

    // Don't double-fetch if agreement.html already did it this session and
    // the cached intent is still fresh.
    var pending = window.CredimedState.get('pendingPaymentIntent', null);
    var TEN_MIN = 10 * 60 * 1000;
    if (pending && pending.clientSecret
        && pending.plan === pricing.plan
        && typeof pending.createdAt === 'number'
        && (Date.now() - pending.createdAt) < TEN_MIN) {
      console.log('[prefetch:plan] already cached, skipping');
      return;
    }

    // Decode the Cognito ID token to get the user's email without loading
    // the Cognito SDK on this page.
    var email = null;
    try {
      var keys = Object.keys(localStorage);
      var idKey = keys.find(function (k) {
        return /CognitoIdentityServiceProvider\..+\..+\.idToken$/.test(k);
      });
      if (idKey) {
        var payload = JSON.parse(atob(localStorage.getItem(idKey).split('.')[1]));
        email = payload.email;
      }
    } catch (e) { /* can't read token */ }
    if (!email) return;

    var claimId = window.CredimedState.get('claim.id');
    if (!claimId && window.CredimedState.generateClaimId) {
      claimId = window.CredimedState.generateClaimId();
    }
    if (!claimId) return;

    var LAMBDA = 'https://vhimqtp4oxicnyv6yarj2kpipe0sjfto.lambda-url.us-west-2.on.aws/';
    var amountForPlan =
      pricing.plan === 'premium' ? 9900 :
      pricing.plan === 'plus'    ? 7900 :
                                   4900;

    console.log('[prefetch:plan] triggering PaymentIntent for', pricing.plan, amountForPlan);
    var t0 = Date.now();
    fetch(LAMBDA, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'create_payment_intent',
        plan: pricing.plan,
        amount: amountForPlan,
        currency: 'usd',
        email: email,
        claimId: claimId
      })
    }).then(function (r) { return r.json(); })
      .then(function (data) {
        var cs = data.clientSecret || data.client_secret || data.paymentIntentClientSecret;
        if (!cs) return;
        window.CredimedState.set('pendingPaymentIntent', {
          clientSecret: cs,
          plan: pricing.plan,
          amount: data.amount || amountForPlan,
          claimId: claimId,
          createdAt: Date.now()
        });
        console.log('[prefetch:plan] PaymentIntent cached in', Date.now() - t0, 'ms');
      })
      .catch(function (e) { console.warn('[prefetch:plan] failed (non-fatal):', e); });
  } catch (e) { /* non-fatal */ }
})();
</script>
<script src="auto-logoff.js"></script>
</body>
</html>
