<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Something went wrong · Credimed</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0D9488">
<style>
:root {
  --teal-600: #0D9488;
  --teal-700: #0B8278;
  --slate-50: #F8FAFC;
  --slate-200: #E2E8F0;
  --slate-500: #64748B;
  --slate-700: #334155;
  --slate-900: #0F172A;
  --amber-600: #D97706;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--slate-900);
  background:
    radial-gradient(ellipse at top left, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(94,234,212,0.08), transparent 55%),
    #FAF6EF;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  text-align: center;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 56px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.14em;
  color: var(--slate-900);
}
.brand .dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--teal-600);
}
.code {
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 14px;
  letter-spacing: 0.2em;
  color: var(--amber-600);
  margin-bottom: 14px;
}
h1 {
  margin: 0 0 14px;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  max-width: 520px;
}
p.lead {
  margin: 0 0 32px;
  font-size: 17px;
  line-height: 1.55;
  color: var(--slate-500);
  max-width: 460px;
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  font-family: inherit;
  cursor: pointer;
  border: 0;
  transition: background 150ms;
}
.btn.primary { background: var(--teal-600); color: #fff; }
.btn.primary:hover { background: var(--teal-700); }
.btn.ghost {
  background: transparent;
  color: var(--slate-700);
  border: 1px solid var(--slate-200);
}
.btn.ghost:hover { background: var(--slate-50); }
.foot {
  margin-top: 64px;
  font-size: 12.5px;
  color: var(--slate-500);
  max-width: 420px;
}
.foot a { color: var(--slate-700); text-decoration: none; }
.foot a:hover { text-decoration: underline; }
@media (max-width: 480px) {
  h1 { font-size: 30px; }
  p.lead { font-size: 15px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>CREDIMED</div>
  <div class="code">500 · SERVER ERROR</div>
  <h1>Something on our end broke.</h1>
  <p class="lead">Our team has been notified and is on it. If you were in the middle of submitting a claim, your data is saved — try again in a minute.</p>
  <div class="actions">
    <a class="btn primary" href="javascript:location.reload()">Retry</a>
    <a class="btn ghost" href="mailto:support@credimed.us?subject=Site%20error">Email support</a>
  </div>
  <div class="foot">
    Persistent issue? Email <a href="mailto:support@credimed.us">support@credimed.us</a> with what you were doing and we'll dig in.
  </div>
</div>
<script src="/cookie-banner.js" defer></script>
</body>
</html>
