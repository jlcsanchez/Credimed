<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credimed — Dashboard (Track your claim)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --teal-50:#F0FDFA; --teal-100:#CCFBF1; --teal-200:#99F6E4; --teal-300:#5EEAD4;
  --teal-400:#2DD4BF; --teal-500:#14B8A6; --teal-600:#0D9488; --teal-700:#0B8278;
  --teal-800:#0A7A70; --teal-900:#134E4A;
  --slate-50:#F8FAFC; --slate-100:#F1F5F9; --slate-200:#E2E8F0; --slate-300:#CBD5E1;
  --slate-400:#94A3B8; --slate-500:#64748B; --slate-600:#475569; --slate-700:#334155;
  --slate-800:#1E293B; --slate-900:#0F172A;

  /* Status gradients — hero tone per variant */
  --hero-teal:   linear-gradient(160deg, #0f172a 0%, #134e4a 55%, #0D9488 100%);
  --hero-green:  linear-gradient(160deg, #052e2b 0%, #065f46 55%, #10B981 100%);
  --hero-slate:  linear-gradient(160deg, #0f172a 0%, #1e293b 55%, #475569 100%);

  /* Status accents */
  --indigo-500:#6366F1; --indigo-200:#C7D2FE;
  --blue-500:#3B82F6; --blue-200:#BFDBFE;
  --green-500:#10B981; --green-600:#059669; --green-200:#A7F3D0;
  --amber-500:#F59E0B; --amber-600:#D97706; --amber-200:#FDE68A;
  --red-50:#FEF2F2; --red-600:#DC2626;

  --font-ui:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono:"SF Mono", ui-monospace, "Menlo", "Monaco", monospace;
}

*{box-sizing:border-box}
html,body{
  margin:0; font-family:var(--font-ui); color:var(--slate-900);
  background:#f0eee9; -webkit-font-smoothing:antialiased;
}

/* ---- Toolbar ---- */
.topbar{
  position:fixed; top:0; left:0; right:0; z-index:50; height:56px;
  background:rgba(255,255,255,0.9); backdrop-filter:blur(14px) saturate(180%);
  border-bottom:1px solid var(--slate-200);
  display:flex; align-items:center; justify-content:space-between; padding:0 20px;
}
.brand{display:flex; align-items:center; gap:10px; font-weight:700; font-size:13px; letter-spacing:0.14em; color:var(--slate-900)}
.brand .bdot{width:8px; height:8px; border-radius:999px; background:var(--teal-600)}
.tabs{display:flex; gap:4px; background:var(--slate-100); padding:4px; border-radius:999px}
.tab{
  padding:7px 14px; border-radius:999px; border:none; background:transparent;
  font-weight:600; font-size:12px; color:var(--slate-600); cursor:pointer;
  font-family:inherit; white-space:nowrap;
}
.tab.active{background:var(--slate-900); color:white}
.meta{font-size:12px; color:var(--slate-500); font-weight:500}

/* ---- Stage ---- */
.stage{
  min-height:100vh; padding-top:80px; padding-bottom:48px;
  display:flex; align-items:flex-start; justify-content:center;
  gap:48px; flex-wrap:wrap;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(13,148,136,0.06), transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(94,234,212,0.08), transparent 55%),
    #f0eee9;
}
.device-wrap{position:relative}
.device-label{
  position:absolute; top:-32px; left:0;
  font-size:12px; font-weight:600; color:var(--slate-500);
  letter-spacing:0.06em; text-transform:uppercase;
}

/* iPhone */
.iphone{
  width:390px; height:810px; background:#0f172a;
  border-radius:52px; padding:10px;
  box-shadow:0 30px 80px rgba(15,23,42,0.22), 0 6px 16px rgba(15,23,42,0.1);
  position:relative; flex-shrink:0;
}
.iphone::before{
  content:""; position:absolute; top:18px; left:50%; transform:translateX(-50%);
  width:110px; height:28px; background:#020617; border-radius:999px; z-index:10;
}
.iphone .screen{
  width:100%; height:100%; background:white; border-radius:42px;
  overflow:hidden; overflow-y:auto; position:relative; scrollbar-width:none;
}
.iphone .screen::-webkit-scrollbar{display:none}

/* Desktop */
.desktop{
  width:720px; background:white; border-radius:16px;
  box-shadow:0 30px 80px rgba(15,23,42,0.18), 0 6px 16px rgba(15,23,42,0.08);
  overflow:hidden; display:flex; flex-direction:column; flex-shrink:0;
}
.desktop .chrome{
  height:44px; background:var(--slate-50);
  border-bottom:1px solid var(--slate-200);
  display:flex; align-items:center; padding:0 16px; gap:8px;
}
.chrome .dots{display:flex; gap:6px}
.chrome .cdot{width:11px; height:11px; border-radius:999px}
.chrome .cdot.r{background:#fc615d} .chrome .cdot.y{background:#fcbb40} .chrome .cdot.g{background:#34c749}
.chrome .url{
  flex:1; margin-left:12px; height:26px; background:white;
  border:1px solid var(--slate-200); border-radius:8px;
  padding:0 12px; display:flex; align-items:center;
  font-size:12px; color:var(--slate-500); gap:8px;
}
.desktop .body{
  height:760px;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(13,148,136,0.05), transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(94,234,212,0.06), transparent 55%),
    var(--slate-50);
  padding:40px 0;
  display:flex; justify-content:center; align-items:flex-start;
  position:relative; overflow:hidden;
}
.desktop-inner{
  width:100%; max-width:480px; height:100%;
  background:white; border-radius:16px;
  box-shadow:0 4px 20px -6px rgba(15,23,42,0.08);
  position:relative; overflow-y:auto; overflow-x:hidden;
}

/* ==================================================== */
/* ==========   DASHBOARD SCREEN STYLES   ============= */
/* ==================================================== */

/* ---- Hero ---- */
.hero{
  position:relative; color:white;
  padding:22px 24px 60px;  /* extra bottom for card overlap */
  overflow:hidden;
}
.hero.teal{background:var(--hero-teal)}
.hero.green{background:var(--hero-green)}
.hero.slate{background:var(--hero-slate)}
.hero::before{
  content:""; position:absolute; inset:-40%;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(94,234,212,0.22), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(13,148,136,0.30), transparent 55%);
  pointer-events:none;
}
.hero.green::before{
  background:
    radial-gradient(ellipse at 20% 10%, rgba(167,243,208,0.25), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(16,185,129,0.30), transparent 55%);
}
.hero.slate::before{
  background:
    radial-gradient(ellipse at 20% 10%, rgba(148,163,184,0.18), transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(100,116,139,0.22), transparent 55%);
}
.hero-top{
  position:relative; display:flex; align-items:center;
  justify-content:space-between; margin-bottom:22px;
}
.icon-btn{
  width:36px; height:36px; border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.08); color:white;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(6px);
}
.logo-badge{
  display:inline-flex; align-items:center; gap:10px;
  padding:8px 14px 8px 10px; border-radius:999px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(12px);
}
.logo-badge .circle{
  width:28px; height:28px; border-radius:999px; background:white;
  display:flex; align-items:center; justify-content:center;
}
.logo-badge .text{font-weight:700; font-size:12px; letter-spacing:0.14em; color:white}

.eyebrow{
  position:relative; font-size:11px; font-weight:700;
  letter-spacing:0.16em; text-transform:uppercase;
  color:rgba(255,255,255,0.7); margin:0 0 8px;
}
.claim-id{
  position:relative; font-family:var(--font-mono); font-size:24px;
  font-weight:700; letter-spacing:0.04em; color:white;
  margin:0 0 14px; line-height:1;
}
.status-pill{
  position:relative; display:inline-flex; align-items:center; gap:7px;
  padding:6px 12px 6px 10px; border-radius:999px;
  font-size:11.5px; font-weight:800; letter-spacing:0.1em;
  text-transform:uppercase; backdrop-filter:blur(8px);
}
.status-pill .sdot{width:7px; height:7px; border-radius:999px; box-shadow:0 0 10px currentColor}
/* pill variants */
.pill-teal{background:rgba(13,148,136,0.22); border:1px solid rgba(94,234,212,0.4); color:var(--teal-200)}
.pill-teal .sdot{background:var(--teal-300)}
.pill-indigo{background:rgba(99,102,241,0.22); border:1px solid rgba(199,210,254,0.45); color:#C7D2FE}
.pill-indigo .sdot{background:#A5B4FC}
.pill-green{background:rgba(16,185,129,0.25); border:1px solid rgba(167,243,208,0.5); color:var(--green-200)}
.pill-green .sdot{background:#6EE7B7}
.pill-amber{background:rgba(245,158,11,0.22); border:1px solid rgba(253,230,138,0.5); color:var(--amber-200)}
.pill-amber .sdot{background:#FCD34D}

/* ---- Status card (floats over hero bottom) ---- */
.body-wrap{padding:0 20px 40px; display:flex; flex-direction:column; gap:18px; position:relative; z-index:5}
.status-card{
  margin-top:-40px;  /* overlap */
  background:white; border:1px solid rgba(15,23,42,0.06);
  border-radius:18px; padding:18px 20px;
  box-shadow:0 10px 30px -10px rgba(15,23,42,0.12), 0 2px 4px rgba(15,23,42,0.04);
  position:relative;
}
.status-card .sc-top{
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;
}
.status-card .sc-label{
  font-size:11px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--slate-500);
}
.status-card .sc-pct{
  font-size:22px; font-weight:800; color:var(--slate-900);
  letter-spacing:-0.02em; font-variant-numeric:tabular-nums;
}
.sc-progress{
  height:8px; border-radius:999px; background:var(--slate-100); overflow:hidden;
}
.sc-progress .fill{
  height:100%; border-radius:999px;
  background:linear-gradient(90deg, var(--teal-500), var(--teal-700));
  transition:width 800ms cubic-bezier(0.4,0,0.2,1);
}
.sc-progress .fill.indigo{background:linear-gradient(90deg, #818CF8, #4F46E5)}
.sc-progress .fill.green{background:linear-gradient(90deg, #34D399, #059669)}
.sc-progress .fill.amber{background:linear-gradient(90deg, #FBBF24, #D97706)}
.sc-bottom{
  display:flex; justify-content:space-between; align-items:center; margin-top:12px;
  font-size:12px; color:var(--slate-500);
}
.sc-bottom b{color:var(--slate-800); font-weight:600}

/* ---- Approved: check circle replaces progress ---- */
.check-circle-wrap{display:flex; align-items:center; gap:14px; margin:4px 0}
.check-circle{
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg, #34D399, var(--green-600));
  display:flex; align-items:center; justify-content:center;
  color:white; flex-shrink:0;
  box-shadow:0 8px 24px -6px rgba(16,185,129,0.5), 0 0 0 6px rgba(16,185,129,0.08);
  animation:check-pop 500ms cubic-bezier(0.2,0.8,0.2,1) backwards;
}
.check-circle svg{animation:check-draw 600ms cubic-bezier(0.2,0.8,0.2,1) 180ms backwards}
@keyframes check-pop{
  0%{transform:scale(0.6); opacity:0}
  60%{transform:scale(1.1)}
  100%{transform:scale(1); opacity:1}
}
@keyframes check-draw{
  0%{stroke-dashoffset:40; opacity:0}
  100%{stroke-dashoffset:0; opacity:1}
}
.check-circle svg polyline{stroke-dasharray:40; stroke-dashoffset:0}
.check-label{flex:1}
.check-label .k{font-size:11px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:var(--green-600); margin-bottom:3px}
.check-label .v{font-size:16px; font-weight:700; color:var(--slate-900); letter-spacing:-0.01em}

/* ---- Timeline ---- */
.timeline-card{
  background:white; border:1px solid rgba(15,23,42,0.06);
  border-radius:16px; padding:22px 20px 18px;
}
.timeline-label{
  font-size:11px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--slate-500); margin-bottom:18px;
}
.timeline{
  position:relative; display:grid; grid-template-columns:repeat(3,1fr);
}
.timeline .line{
  position:absolute; top:11px; left:10%; right:10%;
  height:2px; background:var(--slate-200); z-index:0;
}
.timeline .line .line-fill{
  height:100%; background:var(--teal-600);
  transition:width 800ms cubic-bezier(0.4,0,0.2,1);
}
.timeline .line .line-fill.green{background:var(--green-600)}
.timeline .line .line-fill.indigo{background:var(--indigo-500)}
.timeline .line .line-fill.amber{background:var(--amber-500)}

.tstep{
  position:relative; z-index:1; display:flex;
  flex-direction:column; align-items:center; gap:8px;
}
.tdot{
  width:22px; height:22px; border-radius:999px;
  background:white; border:2px solid var(--slate-300);
  display:flex; align-items:center; justify-content:center;
  color:var(--slate-400); transition:all 300ms ease;
}
.tdot.done{background:var(--teal-600); border-color:var(--teal-600); color:white}
.tdot.done.green{background:var(--green-600); border-color:var(--green-600)}
.tdot.done.indigo{background:var(--indigo-500); border-color:var(--indigo-500)}
.tdot.done.amber{background:var(--amber-500); border-color:var(--amber-500)}
.tdot.current{
  background:white; border-color:var(--teal-600); color:var(--teal-600);
  box-shadow:0 0 0 5px rgba(13,148,136,0.14);
  animation:current-pulse 2s ease-in-out infinite;
}
.tdot.current.indigo{border-color:var(--indigo-500); color:var(--indigo-500); box-shadow:0 0 0 5px rgba(99,102,241,0.18)}
.tdot.current.amber{border-color:var(--amber-500); color:var(--amber-500); box-shadow:0 0 0 5px rgba(245,158,11,0.18)}
@keyframes current-pulse{
  0%,100%{box-shadow:0 0 0 5px rgba(13,148,136,0.14)}
  50%{box-shadow:0 0 0 9px rgba(13,148,136,0.06)}
}
.tdot svg{width:10px; height:10px}
.tstep .t-title{
  font-size:12px; font-weight:700; color:var(--slate-700);
  text-align:center; letter-spacing:-0.005em;
}
.tstep.future .t-title{color:var(--slate-400); font-weight:500}
.tstep .t-date{
  font-size:10.5px; color:var(--slate-500); margin-top:-2px;
  font-variant-numeric:tabular-nums;
}
.tstep.future .t-date{color:var(--slate-300)}

/* ---- Details card ---- */
.details-card{
  background:white; border:1px solid rgba(15,23,42,0.06);
  border-radius:16px; padding:18px 20px;
}
.details-card h3{
  font-size:11px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--slate-500);
  margin:0 0 14px;
}
.d-row{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:9px 0; border-bottom:1px dashed var(--slate-200);
  font-size:13.5px;
}
.d-row:last-of-type{border-bottom:0}
.d-row .dk{color:var(--slate-600); font-weight:500}
.d-row .dv{color:var(--slate-900); font-weight:600; font-variant-numeric:tabular-nums; text-align:right}
.d-row .dv.big{font-size:18px; font-weight:800; letter-spacing:-0.02em}
.d-row .dv.big .sub{font-size:11px; color:var(--slate-500); font-weight:500; display:block; margin-top:1px; letter-spacing:0}
.procedures{
  margin-top:14px; padding-top:14px; border-top:1px dashed var(--slate-200);
}
.procedures .pk{font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--slate-500); margin-bottom:8px}
.procedures ul{list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px}
.procedures li{
  display:flex; align-items:center; gap:8px;
  font-size:13px; color:var(--slate-700); font-weight:500;
  padding:6px 10px; background:var(--slate-50); border-radius:8px;
}
.procedures li .pi{color:var(--teal-600); flex-shrink:0}

/* ---- What's next ---- */
.next-card{
  background:linear-gradient(180deg, var(--teal-50), white);
  border:1px solid rgba(13,148,136,0.14);
  border-radius:16px; padding:18px 20px;
}
.next-card.denied{background:linear-gradient(180deg, #FEF3C7, white); border-color:rgba(245,158,11,0.25)}
.next-card.approved{background:linear-gradient(180deg, #ECFDF5, white); border-color:rgba(16,185,129,0.22)}
.next-card h4{
  font-size:11px; font-weight:800; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--teal-700);
  margin:0 0 10px; display:flex; align-items:center; gap:6px;
}
.next-card.denied h4{color:var(--amber-600)}
.next-card.approved h4{color:var(--green-600)}
.next-card p{
  margin:0; font-size:13.5px; line-height:1.55; color:var(--slate-700);
}
.next-card p + p{margin-top:8px}
.next-card b{color:var(--slate-900); font-weight:600}

/* ---- Support row ---- */
.support-row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.support-btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 12px; background:white; border:1px solid var(--slate-200);
  border-radius:12px; font-size:13px; font-weight:600;
  color:var(--slate-800); text-decoration:none; cursor:pointer;
  font-family:inherit; transition:all 140ms ease;
}
.support-btn:hover{border-color:var(--slate-300); background:var(--slate-50)}
.support-btn .sb-icon{color:var(--teal-600); display:flex}
.support-btn.wa .sb-icon{color:#25D366}

/* ---- Refresh button (ghost) ---- */
.refresh-btn{
  width:100%; padding:13px; background:transparent;
  border:1px solid var(--slate-200); border-radius:12px;
  font-size:13px; font-weight:600; color:var(--slate-600);
  cursor:pointer; font-family:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 140ms ease;
}
.refresh-btn:hover{border-color:var(--slate-300); color:var(--slate-800)}
.refresh-btn .rot{display:flex; transition:transform 600ms cubic-bezier(0.4,0,0.2,1)}
.refresh-btn.spinning .rot{transform:rotate(360deg)}

/* ---- Resubmission CTA (denied only) ---- */
.resub-btn{
  width:100%; padding:14px; margin-top:2px;
  background:white; border:1.5px solid var(--amber-500);
  border-radius:12px; font-size:13.5px; font-weight:700;
  color:var(--amber-600); cursor:pointer; font-family:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.resub-btn:hover{background:#FFFBEB}
.resub-btn .price{
  padding:2px 8px; background:var(--amber-500); color:white;
  border-radius:999px; font-size:11px; letter-spacing:0.02em;
}

/* ---- Trust row ---- */
.trust-row{
  display:flex; justify-content:center; gap:14px; margin-top:8px;
  padding-top:14px; border-top:1px solid var(--slate-200);
}
.trust-chip{
  display:inline-flex; align-items:center; gap:5px;
  font-size:10.5px; font-weight:600; color:var(--slate-500);
  letter-spacing:0.02em;
}
.trust-chip svg{color:var(--slate-400); width:12px; height:12px}

/* ---- Section divider label ---- */
.section-label{
  font-size:11px; font-weight:800; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--slate-500);
  margin:6px 2px -6px;
}

/* safe area */
.safe-bottom{padding-bottom:env(safe-area-inset-bottom)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="bdot"></span>
    CREDIMED · Dashboard
  </div>
  <div class="tabs">
    <button class="tab active" data-variant="submitted">Submitted</button>
    <button class="tab" data-variant="under_review">Under review</button>
    <button class="tab" data-variant="approved">Approved</button>
    <button class="tab" data-variant="denied">Denied</button>
  </div>
  <div class="meta">Track your claim</div>
</div>

<div class="stage">
  <!-- Mobile -->
  <div class="device-wrap">
    <div class="device-label">Mobile · 390px</div>
    <div class="iphone">
      <div class="screen" id="screen-mobile"></div>
    </div>
  </div>

  <!-- Desktop -->
  <div class="device-wrap">
    <div class="device-label">Desktop · 480px max</div>
    <div class="desktop">
      <div class="chrome">
        <div class="dots"><span class="cdot r"></span><span class="cdot y"></span><span class="cdot g"></span></div>
        <div class="url">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          app.credimed.us/claim/CMX-2026-0A4B29
        </div>
      </div>
      <div class="body">
        <div class="desktop-inner" id="screen-desktop"></div>
      </div>
    </div>
  </div>
</div>

<!--
  DATA CONTRACT — replace renderScreen() mock data with API fetch:

  GET /api/claims/:id
  Authorization: Bearer {cognitoJwt}
  →
  {
    claim_id: "CMX-2026-0A4B29",
    status: "submitted" | "under_review" | "approved" | "denied",

const ICONS = {

  flag:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>',
  alert:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',

// ---- Claim data (static mock) ----
const CLAIM = {
  id: 'CMX-2026-0A4B29',
  plan: { tier: 'Standard', price: 49 },
  paid_at_clinic: 790,
  refund_low: 450,
  refund_high: 610,
  procedures: ['Crown (zirconia)', 'Root canal'],
  submitted: 'Apr 23, 2026',
  updated:   'Apr 24, 2026',
};

// ---- Variant config ----
const VARIANTS = {
  submitted: {
    heroTone: 'teal',
    pillClass: 'pill-teal',
    pillLabel: 'Submitted',
    accent: 'teal',   // progress-bar / timeline accent
    pct: 20,
    lineFillPct: 0,   // timeline line fill (% between dots 1→3)
    timeline: [
      { label: 'Submitted',    date: 'Apr 23', state: 'current' },
      { label: 'Under review', date: null,     state: 'future' },
      { label: 'Decision',     date: null,     state: 'future' },
    ],
    next: {
      title: "What's next",
      p1: "Your claim was sent to your US insurer on <b>Apr 23</b>. Most insurers acknowledge receipt within <b>1–2 business days</b>.",
      p2: "We'll email you the moment they move it into review. No action needed from you."
    },
    nextClass: '',
  },
  under_review: {
    heroTone: 'teal',
    pillClass: 'pill-indigo',
    pillLabel: 'Under review',
    accent: 'indigo',
    pct: 55,
    lineFillPct: 50,
    timeline: [
      { label: 'Submitted',    date: 'Apr 23', state: 'done' },
      { label: 'Under review', date: 'Apr 24', state: 'current' },
      { label: 'Decision',     date: null,     state: 'future' },
    ],
    next: {
      title: "What's next",
      p1: "Your insurer's claims team is actively reviewing. Typical turnaround is <b>10–15 business days</b> at this stage.",
      p2: "If they request additional documentation, we'll handle it and loop you in only if we need something from you."
    },
    nextClass: '',
  },
  approved: {
    heroTone: 'green',
    pillClass: 'pill-green',
    pillLabel: 'Approved',
    accent: 'green',
    pct: 100,
    lineFillPct: 100,
    timeline: [
      { label: 'Submitted',    date: 'Apr 23', state: 'done' },
      { label: 'Under review', date: 'Apr 24', state: 'done' },
      { label: 'Approved',     date: 'May 8',  state: 'done' },
    ],
    next: {
      title: "Approved",
      p1: "Your insurer has <b>approved your reimbursement</b>. Expect payment in <b>5–10 business days</b>, deposited to the bank account on file with them.",
      p2: "Remember: your insurer sends the money directly — Credimed never touches your refund."
    },
    nextClass: 'approved',
  },
  denied: {
    heroTone: 'slate',
    pillClass: 'pill-amber',
    pillLabel: 'Needs attention',
    accent: 'amber',
    pct: 40,
    lineFillPct: 50,
    timeline: [
      { label: 'Submitted',    date: 'Apr 23', state: 'done' },
      { label: 'Under review', date: 'Apr 24', state: 'done' },
      { label: 'Decision',     date: 'Apr 29', state: 'current' },  // current-amber = flagged
    ],
    next: {
      title: "Denial received — resubmission available",
      p1: "Your insurer flagged a <b>coding mismatch</b> on procedure D2740 (crown). This is routine and often resolvable with the correct documentation.",
      p2: "Our specialists can prepare a corrected resubmission. Most resubmissions succeed on the second try."
    },
    nextClass: 'denied',
  },
};

// ---- Renderer ----
function renderScreen(variant, scope){
  const v = VARIANTS[variant];
  const c = CLAIM;

  // Timeline dots
  const timelineDots = v.timeline.map((t, i) => {
    const isDone = t.state === 'done';
    const isCurrent = t.state === 'current';
    const dotClasses = [
      'tdot',
      isDone ? `done ${v.accent}` : '',
      isCurrent ? `current ${v.accent}` : '',
    ].filter(Boolean).join(' ');
    const icon = isDone ? ICONS.check : (isCurrent ? ICONS.dot : ICONS.dot);
    const titleClass = t.state === 'future' ? 'future' : '';
    return `
      <div class="tstep ${t.state === 'future' ? 'future' : ''}">
        <div class="${dotClasses}">${icon}</div>
        <div class="t-title">${t.label}</div>
        <div class="t-date">${t.date || '—'}</div>
      </div>`;
  }).join('');

  // Status card body — approved shows check circle instead of progress bar
  const statusCardBody = variant === 'approved' ? `
    <div class="check-circle-wrap">
      <div class="check-circle">${ICONS.checkBig}</div>
      <div class="check-label">
        <div class="k">Claim approved</div>
        <div class="v">Payment on the way</div>
      </div>
    </div>
    <div class="sc-bottom" style="border-top:1px dashed var(--slate-200); padding-top:12px; margin-top:14px">
      <span>Submitted <b>${c.submitted}</b></span>
      <span>Updated <b>${v.timeline[2].date}</b></span>
    </div>
  ` : `
    <div class="sc-top">
      <span class="sc-label">${variant === 'denied' ? 'Status' : 'Progress'}</span>
      <span class="sc-pct">${v.pct}%</span>
    </div>
    <div class="sc-progress"><div class="fill ${v.accent}" style="width:${v.pct}%"></div></div>
    <div class="sc-bottom">
      <span>Submitted <b>${c.submitted}</b></span>
      <span>Updated <b>${c.updated}</b></span>
    </div>
  `;

  // Details card
  const detailsCard = `
    <div class="details-card">
      <h3>Claim details</h3>
      <div class="d-row">
        <span class="dk">Plan</span>
        <span class="dv">${c.plan.tier} · $${c.plan.price}</span>
      </div>
      <div class="d-row">
        <span class="dk">Paid at clinic</span>
        <span class="dv">$${c.paid_at_clinic.toLocaleString()} USD</span>
      </div>
      <div class="d-row">
        <span class="dk">Estimated refund</span>
        <span class="dv big">$${c.refund_low}–$${c.refund_high}
          <span class="sub">Final amount set by insurer</span>
        </span>
      </div>
      <div class="procedures">
        <div class="pk">Procedures</div>
        <ul>
          ${c.procedures.map(p => `<li><span class="pi">${ICONS.tooth}</span>${p}</li>`).join('')}
        </ul>
      </div>
    </div>
  `;

  // Resubmission CTA (denied only)
  const resubCta = variant === 'denied' ? `
    <button class="resub-btn" data-resub data-scope="${scope}">
      ${ICONS.sparkle}
      <span>Request resubmission</span>
      <span class="price">$19</span>
    </button>
  ` : '';

  return `
    <div class="hero ${v.heroTone}">
      <div class="hero-top">
        <button class="icon-btn" aria-label="Back">${ICONS.back}</button>
        <div class="logo-badge">
          <span class="circle">${ICONS.mark}</span>
          <span class="text">CREDIMED</span>
        </div>
        <button class="icon-btn" aria-label="Sign out">${ICONS.signOut}</button>
      </div>
      <div class="eyebrow">Claim status</div>
      <div class="claim-id">${c.id}</div>
      <span class="status-pill ${v.pillClass}">
        <span class="sdot"></span>${v.pillLabel}
      </span>
    </div>

    <div class="body-wrap safe-bottom">
      <div class="status-card">
        ${statusCardBody}
      </div>

      <div class="timeline-card">
        <div class="timeline-label">Timeline</div>
        <div class="timeline">
          <div class="line"><div class="line-fill ${v.accent}" style="width:${v.lineFillPct}%"></div></div>
          ${timelineDots}
        </div>
      </div>

      ${detailsCard}

      <div class="next-card ${v.nextClass}">
        <h4>${variant === 'approved' ? ICONS.checkBig : (variant === 'denied' ? ICONS.alert : ICONS.clock)} ${v.next.title}</h4>
        <p>${v.next.p1}</p>
        <p>${v.next.p2}</p>
      </div>

      <div class="support-row">
        <a class="support-btn" href="mailto:support@credimed.us">
          <span class="sb-icon">${ICONS.mail}</span>
          <span>Email support</span>
        </a>
        <a class="support-btn wa" href="https://wa.me/15555550100">
          <span class="sb-icon">${ICONS.whatsapp}</span>
          <span>WhatsApp</span>
        </a>
      </div>

      ${resubCta}

      <button class="refresh-btn" data-refresh data-scope="${scope}">
        <span class="rot">${ICONS.refresh}</span>
        <span>Refresh status</span>
      </button>

      <div class="trust-row">
        <span class="trust-chip">${ICONS.shield} HIPAA-aligned</span>
        <span class="trust-chip">${ICONS.lock} 256-bit encrypted</span>
      </div>
    </div>
  `;
}

// ---- State & mounting ----
const state = {
  mobile: { variant: 'submitted' },
  desktop: { variant: 'submitted' },
};

function mountScope(scope){
  const el = document.getElementById(`screen-${scope}`);
  el.innerHTML = renderScreen(state[scope].variant, scope);
  wireScope(scope);
}

function wireScope(scope){
  const container = document.getElementById(`screen-${scope}`);
  const refreshBtn = container.querySelector(`[data-refresh][data-scope="${scope}"]`);
  if (refreshBtn){
    refreshBtn.addEventListener('click', () => {
      refreshBtn.classList.add('spinning');
      setTimeout(() => refreshBtn.classList.remove('spinning'), 700);
    });
  }
}

function setVariant(v){
  state.mobile.variant = v;
  state.desktop.variant = v;
  mountScope('mobile');
  mountScope('desktop');
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    setVariant(t.getAttribute('data-variant'));
  });
});

mountScope('mobile');
mountScope('desktop');
</script>
